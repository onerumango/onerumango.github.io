<div class="pageContentMain" class="mt-1">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Profile</h2>
    </div>
    <form action="" class="formStyle" [formGroup]="userForm">
      <div class="dbCardStyle fieldwidth" style="width:600px;">
        <div class="col-lg-4" style="margin-left: 25%;">
          <label class="hoverable" for="fileInput">
            <img [src]="url ? url : 'assets/images/user.png'" />
            <!-- <img [src]="profileURL">  -->
            <!-- <div class="hover-text">Choose file</div> -->
            <div class="background"></div>
            <label>
              
              <img src="assets/images/edit.svg" style="height: 30px;
              width: 20px;">
              <input type="file"  (change)="onSelectFile($event)" name="myfile" style="display:none">
            </label>
            <label>
            <img src="assets/images/delete.svg"  (click)="delete()" style="height: 30px;margin-left: 150px;
            width: 20px;">
            </label>
          </label>
      
      
         
          
          <br />
        
          <!-- <input
            id="fileInput"
            type="file"
            accept="image/png, image/gif, image/jpg, image/jpeg"
            (change)="onSelectFile($event)"
          /> -->
         
        </div>
        <fieldset [disabled]="!submit">
         
          <div class="row gy-4" style="margin-top: 0%;">
            <div class="col-lg-4">
              <label class="formLbl">UserId<span class="colorRed">*</span></label>
         <div class="d-flex">
              <input id="userId" placeholder="Old Password" required class="form-control" value="" #userId
                name="userId"  formControlName="userId">
            </div>
            </div>
            <div class="col-lg-4">
              <label class="formLbl">User Name<span class="colorRed">*</span></label>
              <div class="d-flex">
                <input id="userName" placeholder="User Name" required class="form-control" value="" #userName
                  name="userName"  formControlName="userName">
              </div>
            </div>
            <div class="col-lg-4">
              <label class="formLbl">Department<span class="colorRed">*</span></label>
              <div class="d-flex">
                <input id="confirm password" placeholder="Confirm Password" required class="form-control" value=""
                  #department name="department" 
                  formControlName="department">
              </div>
            </div>
          </div>
        </fieldset>
        <div class="col-lg-12">
          <div class="row g-3 pt-3 mt-2 justify">
    
            <div class="col-auto">
              <button href="javascript:void(0)"  (click)="submitPhoto()" 
                class="btn smBtn minWdSmBtn btnPrimary">Upload Image</button>
            </div>
    
            <div class="col-auto">
              <a href="javascript:void(0)" class="btn smBtn minWdSmBtn btnSecondary" [routerLink]="['/dashboard']">Exit</a>
            </div>
          </div>
        </div>

      </div>
    </form>
  </div>
