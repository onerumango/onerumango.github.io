<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Charge Maintenance Summary</h2>
    </div>
    <div class="dbCardStyle">
        <div class="row g-3 pb-3 justify-content-end">
            <div class="col-auto">
              <a (click)="new()" *ngIf="roleCodes.new" class="btn smBtn minWdSmBtn btnPrimary">{{roleCodes.new.labelDescription}}</a>
            </div>
            <div class="col-auto">
              <a [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
            </div>
          </div>
      <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="dataTable table tableStyle responsive nowrap" style="width:100%">
        <!-- chargeAmount: 324
        chargePercentage: "100"
        currency: "224"
        id: 2
        inputBy: "JAN13"
        inputTime: "2022-03-23T09:49:28.539+0000"
        modNo: 30
        recordStatus: "O"
        taxAmount: 53
        taxPercentage: "63"
        verifiedBy: null
        verifiedOnce: "Y"
        verifiedStatus: "U"
        verifiedTime: null -->
        <thead>
          <tr>
            <th>Currency</th>
            <th>Charge Amount</th>
            <th>Tax Amount</th>
            <th>Auth Status</th>
            <th>Record Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of respArray ">
            <td><a class="primaryColor" style="cursor: pointer;" (click)="edit(data)" class="primaryColor">{{data.currency}}</a></td>
            <td>{{data.chargeAmount}}</td>
            <td>{{data.taxAmount}}</td>
            <td>{{ data.approvedStatus }}</td>
            <td>{{ data.recordStatus }}</td>
            <td>{{data.inputTime | date:'medium'}}</td>
            <td><span style="display: flex;  
              gap: 50px;">
             <button class="iconBtn" color="primary" *ngIf="(data.recordStatus== 'O' || data.recordStatus== 'Open' || data.recordStatus== 'OPEN') && (data.verifiedOnce== 'Y' || data.verifiedOnce== 'YES')" (click)="close(data)">
              <div class="btnTooltip">close</div> 
              <img src="assets/images/CROSS1.svg"   alt="...">
              </button> 
             <button class="iconBtn" color="primary" *ngIf="data.recordStatus== 'C'" (click)="open(data)">
              <div class="btnTooltip">Open</div> 
              <img src="assets/images/open.svg"  alt="...">
              </button>
              <button class="iconBtn" color="primary" *ngIf="data.verifiedOnce== 'N' || data.verifiedOnce== 'NO'" (click)="delete(data)">
                <div class="btnTooltip">Delete</div> 
                <img src="assets/images/delete.svg" alt="...">
              </button>
               <button  class="iconBtn" color="primary" *ngIf="data.verifiedStatus== 'U' || data.verifiedStatus== 'UNAUTHORIZED'" (click)="auth(data)">
                <div class="btnTooltip">Authorize</div> 
                <img src="assets/images/authorize.svg" alt="Authorize">
                </button>
            </span></td>
          </tr>
        
        </tbody>
      </table>
      <ng-container *ngIf="isLoading">
        <div class="loading-page-center">
          <span class="indicator-progress">Please wait...
            <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
        </div>
      </ng-container>
    </div>
</div>
