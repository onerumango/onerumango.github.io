<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Rule Mapping</h2>
  </div>
  <div class="dbCardStyle">
    <div class="row g-3 pb-3 justify-content-end">
      <div class="col-auto"  *ngIf="roleCodes.new">
        <a [routerLink]="['/rule-mapping/create']" [routerLinkActive]="['active']" class="btn smBtn minWdSmBtn btnPrimary">{{roleCodes.new.labelDescription}}</a>
      </div>
      <div class="col-auto">
        <a [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
      </div>
    </div>
    <div class="table-responsive">
    <table datatable id="dbTable1" [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="dataTable table tableStyle  nowrap vAlignMdl" style="width:100%">
      <thead>
        <tr>
          <th>Source System</th>
          <th>Destination System</th>
          <th>Auth Status</th>
          <th>Record Status</th>
          <th>Date</th>
          <!-- <th>Conversion</th> -->
          <th>Action</th>
      
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let data of ruleMappingListResp">
          <td> <a style="cursor: pointer;" (click)="getById(data)" class="primaryColor">{{ data.sourceTranslationId}}</a></td>
          <td>{{ data.targetTranslationId }}</td>
          <td>{{ data.approvedStatus}}</td>
          <td>{{ data.recordStatus }}</td>
          <td>{{ data.createdTime | date:'medium' }}</td>
          <td>
            <button  class="btn" style="color: red" title="Authorize" [disabled]="!(data.approvedStatus== 'U' || data.approvedStatus== 'UNAUTHORIZED' || data.approvedStatus == 'Unauthorized')" (click)="auth(data)">
                
              <img src="assets/images/authorize.svg" alt="Authorize">
              </button>
            <button class="btn" style="color: red" title="Close" *ngIf="(data.recordStatus== 'O' || data.recordStatus== 'Open' || data.recordStatus== 'OPEN') && (data.approvedEver== 'Y' || data.approvedEver== 'YES')" (click)="close(data)">
                
              <img src="assets/images/CROSS1.svg"   alt="...">
              </button> 
             <button class="btn" style="color: red" title="Reopen" *ngIf="(data.recordStatus == 'CLOSED' || data.recordStatus == 'Close') && (data.approvedEver == 'YES' || data.approvedEver == 'Y')"
 
                
                      (click)="open(data)">
              
              <img src="assets/images/open.svg"  alt="...">
              </button>
              <button class="btn" style="color: red" title="Delete" *ngIf="data.approvedEver== 'N' || data.approvedEver== 'NO'" (click)="delete(data)">
                 
                <img src="assets/images/delete.svg" alt="...">
              </button>
               
          </td>
        </tr>
      </tbody>
    </table>
  </div>
    <ng-container *ngIf="isLoading">
      <div class="loading-page-center">
        <span class="indicator-progress">Please wait...
          <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
      </div>
    </ng-container>
    
  </div>


</div>
