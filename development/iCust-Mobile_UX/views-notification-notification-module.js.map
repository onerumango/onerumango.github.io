export default "<ion-header>\r\n  <ion-toolbar  class=\"new-background-color\">\r\n    <ion-icon name=\"chevron-back-outline\" (click)=\"previous()\"></ion-icon>\r\n    <span class=\"text\" style=\"margin-left: 2%;\">Notification</span>\r\n  </ion-toolbar>\r\n</ion-header>\r\n\r\n<ion-content>\r\n  <ion-list *ngFor=\"let n of notifications\">\r\n    <ion-item>\r\n      <ion-label>\r\n        <h4 class=\"message\">{{n.message}}</h4>\r\n        <small class=\"time text-muted\">{{n.time}}</small>\r\n      </ion-label>\r\n    </ion-item>\r\n  </ion-list>\r\n  <div class=\"text-center mt-16\" *ngIf=\"notifications.length\">\r\n    <ion-button expand=\"full\" (click)=\"clearAll($event)\">Clear all notifications</ion-button>\r\n  </div>\r\n \r\n</ion-content>\r\n";
