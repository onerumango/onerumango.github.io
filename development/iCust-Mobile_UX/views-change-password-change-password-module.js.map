export default "<ion-header>\r\n  <ion-toolbar  class=\"new-background-color\">\r\n    <ion-icon name=\"chevron-back-outline\" (click)=\"previous()\"></ion-icon>\r\n    <span class=\"text\" style=\"margin-left: 2%;\">Change Password</span>\r\n  </ion-toolbar>\r\n</ion-header>\r\n<ion-content>\r\n \r\n  <form  [formGroup]=\"changePasswordForm\">\r\n\r\n    <ion-list>\r\n      <ion-item>\r\n        <ion-label style=\"font-size: 26px;color:#1F618D;font-weight: 600;\" position=\"stacked\">Current Password</ion-label>\r\n    <ion-input placeholder=\"Enter Current Password\" [type]=\"currShowPassword ? 'text' : 'password'\"\r\n    formControlName=\"currentPassword\"></ion-input>\r\n      <ion-icon  class=\"suffix-icon\" (click)=\"onPasswordToggle('current')\" ion-button clear small item-end [name]=\"currShowPassword ? 'eye' : 'eye-off'\"></ion-icon>\r\n      </ion-item>\r\n      <ion-item>\r\n        <ion-label style=\"font-size: 26px;color:#1F618D;font-weight: 600;\" position=\"stacked\">New Password</ion-label>\r\n        <ion-input [type]=\"newShowPassword ? 'text' : 'password'\" placeholder=\"Enter New Password\" formControlName=\"newPassword\"\r\n        ></ion-input>\r\n      <ion-icon  class=\"suffix-icon\" (click)=\"onPasswordToggle('new')\" ion-button clear small item-end [name]=\"newShowPassword ? 'eye' : 'eye-off'\"></ion-icon>\r\n      </ion-item>\r\n      <ion-item>\r\n        <ion-label style=\"font-size: 26px;color:#1F618D;font-weight: 600;\" position=\"stacked\">Re-enter New Password</ion-label>\r\n        <ion-input [type]=\"reEnterShowPassword ? 'text' : 'password'\" placeholder=\"Re-enter Current Password\" formControlName=\"newPasswordConfirmation\"></ion-input>\r\n      <ion-icon  class=\"suffix-icon\" (click)=\"onPasswordToggle('reenter')\" ion-button clear small item-end [name]=\"reEnterShowPassword ? 'eye' : 'eye-off'\"></ion-icon>\r\n      </ion-item>\r\n    </ion-list>\r\n    <!-- <div >\r\n      <ion-item>\r\n        <ion-label position=\"stacked\">Current Password</ion-label>\r\n    <ion-input placeholder=\"Enter Current Password\" [type]=\"showPassword ? 'text' : 'password'\"\r\n    formControlName=\"currentPassword\" ngDefaultControl></ion-input>\r\n    <button class=\"suffix-icon\" (click)=\"onPasswordToggle()\" ion-button clear small item-end icon-only>\r\n      <ion-icon  class=\"suffix-icon\" (click)=\"onPasswordToggle()\" ion-button clear small item-end [name]=\"showPassword ? 'eye' : 'eye-off'\"></ion-icon>\r\n    </button>\r\n      </ion-item>\r\n    \r\n    </div>\r\n    <div class=\"inputCard\">\r\n      <ion-label>New Password</ion-label>\r\n      <ion-input class=\"box\" placeholder=\"Enter New Password\" formControlName=\"newPassword\" ngDefaultControl></ion-input>\r\n    \r\n      </div>\r\n      <div class=\"inputCard\">\r\n        <ion-label>Re-enter New Password</ion-label>\r\n        <ion-input class=\"box\" placeholder=\"Re-enter Current Password\" formControlName=\"newPasswordConfirmation\" ngDefaultControl></ion-input>\r\n      \r\n        </div> -->\r\n\r\n    </form>\r\n  \r\n     \r\n  \r\n  </ion-content>\r\n  <div>\r\n    <ion-button  expand=\"block\" shape=\"round\" style=\"height:56px;margin-left:16pt;margin-right:16pt;margin-bottom: 31px;\"\r\n    (click)=\"save()\">Save Changes</ion-button>\r\n    </div>\r\n\r\n\r\n\r\n";
