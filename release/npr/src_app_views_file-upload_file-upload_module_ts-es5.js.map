<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Upload Excel</h2>
    </div>
    <form action="" [formGroup]="uploadExcelForm" class="formStyle">
      <div class="dbCardStyle">
        <div class="row g-3 pb-3 justify-content-end">
          <div class="col-auto">
            <button (click)="refreshGl()" *ngIf="roleCodes.new" class="btn smBtn minWdSmBtn btnPrimary">Refresh CCY Rate</button>
          </div>
        </div>
        <div class="row gy-4 align-items-end">
          <div class="col-lg-4">
            <label for="extSystem" class="formLbl">External System</label>
            <select class="form-select" formControlName="extSysNameData"  (change)="getProcessNamesBasedOnExtSysNameForUpload($event.target.value)" aria-label="Default select example">
              <option value="" [selected]="isSelected">Select</option>
              <option *ngFor="let extSysName of allExternalSystemNames" [value]="extSysName">{{extSysName}}</option>
            </select>
          </div>
          <div class="col-lg-4">
            <label for="extSystem" class="formLbl">Process Name</label>
            <select class="form-select" formControlName="processNameData" (change)="getFileNamesBasedOnExtSysNameAndProcessName(uploadExcelForm.get('extSysNameData').value,$event.target.value)" aria-label="Default select example">
              <option value="" [selected]="isSelected">Select</option>
              <option *ngFor="let processName of processNames" [value]="processName">{{processName}}</option>
            </select>
          </div>
          <div class="col-lg-4">
            <label for="transactionDate" class="formLbl">Transaction Date</label>
            <input id="transactionDate" formControlName="selectorDateData" type="text" class="form-control" value="" readonly>
          </div>
          <div class="col-lg-4">
            <label for="extSystem" class="formLbl">Transaction Code</label>
            <select class="form-select" formControlName="trncode" (change)="getTrnCode($event.target.value)" aria-label="Default select example">
              <option value="" [selected]="isSelected">Select</option>
              <option *ngFor="let trncode of trnCodeArray" [value]="trncode.trnCode">{{ trncode.trnDesc }} {{trncode.trnCode}}</option>
            </select>
          </div>
          <div *ngIf="enablefilebrowser" class="col-lg-4">
            <label for="transactionDate" class="formLbl">File Name</label>
            <input required id="fileName" formControlName="fileName" type="text"
            (keypress)="valuechange($event)" (keyup)="fun(excelDataProcessingReqDTO.fileName)" class="form-control" value="">
          </div>
          <div *ngIf="enablefilebrowser" class="col-lg-4">
            <div class="fileUpload">
              <div class="formS">
                <div class="file-upload-wrapper" data-text="File Upload">
                  <input name="file-upload-field"  type="file" class="file-upload-field"
                   (change)="getFiledata($event,uploadExcelForm.get('extSysNameData').value,uploadExcelForm.get('processNameData').value,uploadExcelForm.get('fileName').value)" value="">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="row g-3 pb-3 justify-content-end pt-4">
          <div class="col-auto">
            <button (click)="doFirstValidation()"
             class="btn smBtn minWdSmBtn btnPrimary">
             <ng-container *ngIf="isUploading; else showText">
              <span class="indicator-progress" >Uploading, Please wait... 
                <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
              </span>
            </ng-container>
            <ng-template #showText>
              <span class="indicator-label"> Upload Data</span>
            </ng-template>
          </button>
          </div>
          <div class="col-auto">
            <button type="reset" class="btn smBtn minWdSmBtn btnDarkGrey">Reset</button>
          </div>
          <div class="col-auto">
            <a [routerLink]="[ '/dashboard' ]" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
          </div>
        </div>
        <div class="titleStyle mt-2 mb-4 text-end">
          <h2 class="pageTitle darkgreyClr">Final excel report can be downloaded from Process Excel Screen.</h2>
        </div>

      </div>
      <div class="dbCardStyle" *ngIf="responsebutton">
        <div class="titleStyle mt-2 mb-4">
          <h2 class="pageTitle darkgreyClr">File Upload Summary</h2>
        </div>
        <div class="row gy-4">
          <div class="col-lg-4">
            <label for="codeLbl" class="formLbl">Batch Number</label>
            <p class="readonlyText">{{ responseDto.batchNo }}</p>
          </div>
          <div class="col-lg-4">
            <label for="codeLbl" class="formLbl">Total No Of records</label>
            <p class="readonlyText">{{ responseDto.totalNoOfRecords }}</p>
          </div>
          <div class="col-lg-4">
            <label for="codeLbl" class="formLbl">Total Debit Amount</label>
            <p class="readonlyText">{{ responseDto.totalDebitAmount }}</p>
          </div>
          <div class="col-lg-4">
            <label for="codeLbl" class="formLbl">Total Credit Amount</label>
            <p class="readonlyText"> {{ responseDto.totalCreditAmount }}</p>
          </div>
          <div class="col-lg-4">
            <label for="codeLbl" class="formLbl">Sum (Credit - Debit)</label>
            <p class="readonlyText">{{ responseDto.sumAmount }}</p>
          </div>
          <div class="col-lg-4">
            <label for="codeLbl" class="formLbl">Value Date</label>
            <p class="readonlyText">{{valueDate }}</p>
          </div>
          <div class="col-lg-6">
            <label for="remarks" class="formLbl">Remarks</label>
            <textarea class="form-control textAreaCol" id="remarks" formControlName="remarks" rows="3" placeholder="External System"></textarea>
          </div>
          <div class="col-lg-6">
            <label for="overrides" class="formLbl">Overrides</label>
            <textarea class="form-control textAreaCol" id="exampleFormControlTextarea1" rows="3">{{ responseDto.overrideMessage }}</textarea>
          </div>

        </div>
        <div class="row g-3 pb-3 pt-4 justify-content-end">
          <div class="col-auto">
            <button (click)="Datacheck()" [disabled]="flag" class="btn smBtn minWdSmBtn btnPrimary btnLight">
              <ng-container *ngIf="isProcessing; else showProcess">
                <span class="indicator-progress" >Processing, Please wait... 
                  <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
                </span>
              </ng-container>
              <ng-template #showProcess>
                <span class="indicator-label"> Process</span>
              </ng-template>
              
            </button>
          </div>
          <div class="col-auto">
            <button (click)="deleteDataService(uploadExcelForm.get('remarks').value)" class="btn smBtn minWdSmBtn btnPrimary">Delete</button>
          </div>
          <div class="col-auto">
            <a class="btn smBtn minWdSmBtn btnDarkGrey" (click)="downloadData()">View Excel</a>
          </div>
          <div class="col-auto">
            <button (click)="exit()" class="btn smBtn minWdSmBtn btnSecondary">Hide</button>
          </div>
        </div>
      </div>

    </form>
  </div>
