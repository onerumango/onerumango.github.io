<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Rule Translation </h2>
  </div>
  <form class="formStyle" *ngIf="ruleTransForm" [formGroup]="ruleTransForm">
    <fieldset [disabled]="!submitFlag">
    <div class="dbCardStyle">
  
      <div class="row gy-4 align-items-end">
        <div class="col-lg-3">
          <label for="roleName" class="formLbl">Source System</label>
          <select
            id="sysCode"
            formControlName="systemCode"
            class="form-select"
            aria-label="Default select example"
            (change)="onSlectionExternalSystem($event)"
            required
          >
            <option value="" [selected]="isSelected">--Please Select---</option>
            <option *ngFor="let extsys of externalSystem" [value]="extsys">
              {{ extsys }}
            </option>
          </select>
        </div>
        <div class="col-lg-3">
          <label for="roleName" class="formLbl">Message Type</label>
          <select
            id="msgType"
            formControlName="messageType"
            class="form-select"
            aria-label="Default select example"
            (change)="onSelectionOFMessageType($event)"
          >
            <option value="" [selected]="isSelected">--Please Select---</option>
            <option value="I">Incoming</option>
            <option value="O">OutGoing</option>
            <!-- <option value="A">All</option> -->
          </select>
        </div>

        <div class="col-lg-3">
          <label for="roleName" class="formLbl">Service</label>
          <select
            id="serviceName"
            formControlName="serviceName"
            class="form-select"
            aria-label="Default select example"
          >
            <option value="" [selected]="isSelected">--Please Select---</option>
            <option
              *ngFor="let serv of translationDataService"
              [value]="serv.headerValue"
            >
              {{ serv.headerValue }}
            </option>
          </select>
        </div>

        <div class="col-lg-3">
          <label for="roleName" class="formLbl">Operation</label>
          <select
            id="operationName"
            formControlName="operationName"
            class="form-select"
            aria-label="Default select example"
          >
            <option value="" [selected]="isSelected">--Please Select---</option>
            <option
              *ngFor="let opt of translationDataOperation"
              [value]="opt.headerValue"
            >
              {{ opt.headerValue }}
            </option>
          </select>
        </div>

        <div class="col-lg-3" class="fileUpload" *ngIf="showFetch=='Https/Http'" (click)="chooseFile()">
          <div class="formS">
             <div class="file-upload-wrapper" data-text="File Upload">
               <input id="chFile" name="file-upload-field" type="file" class="file-upload-field" [value]="fileName" (change)="selectFileFORHTTPXMLIncoming($event)">
             </div>
           </div>
         </div>

        <div class="col-lg-3" *ngIf="showFetch == 'TCP/IP'">
          <a
            (click)="onFetch()"
            class="btn minWdSmBtn btnPrimary"
            
            >Fetch</a
          >
        </div>
      </div>
   
  </div>
  <!-- *ngIf="showRecords" -->
  <div class="dbCardStyle" *ngIf="showRecords">
    <div class="table-responsive">
      <table id="dbTable1" class="table tableStyle responsive nowrap vAlignMdl">
        <thead>
          <tr *ngIf="msgTransDetails.controls">
            <th *ngIf="showFetch=='TCP/IP'">
              Field No.
            </th>
           <th *ngIf="showFetch=='Https/Http'">
            Tag
           </th>
            <th>
              <ng-container *ngIf="showFetch=='TCP/IP'; else showType">
                Data type
              </ng-container>
              <ng-template #showType>
                Data type
              </ng-template>
            </th>
            <th>Default value</th>
            <th>Encryption</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <ng-container formArrayName="msgTransDetails">
            <tr
              *ngFor="let item of msgTransDetails.controls;let i = index">
              <ng-container [formGroup]="item">
                <td *ngIf="showFetch=='TCP/IP'">
                 
                    <select
                      id="fieldNo_{{ i }}"
                      formControlName="messageKey"
                      class="form-select"
                      aria-label="Default select example"
                      (change)="onselectOfFieldNo($event,i)"
                      required
                    >
                      <!-- <option value="" [selected]="isSelected">--Please Select---</option> -->
                      <option *ngFor="let iso2 of fieldNoList" [hidden]="try(iso2.messageKey)" [value]="iso2.messageKey">
                      {{iso2.messageKey}}<{{iso2.messagebasis}}
                      </option>
                    </select>
                </td>
                <td *ngIf="showFetch=='Https/Http'">
                    <select
                    id="tag_{{ i }}"
                    formControlName="messagebasis"
                    class="form-select"
                    aria-label="Default select example"
                    (change)="onselectingTag($event,i)"
                  >
                    <option value="" [selected]="isSelected">--Please Select---</option>
                    <option [hidden]="try(data)" *ngFor="let data of messageBasisIso" [value]="data">
                      {{data}}</option>
                  </select>
                </td>
                <td *ngIf="showFetch=='TCP/IP'">
               
                    <input
                    id="dataType_{{ i }}"
                    type="text"
                    formControlName="dataType"
                    class="form-control"
                    value=""
                  />
                
                </td>
              
                <td *ngIf="showFetch=='Https/Http'">
                  <select
                    id="dataType_{{ i }}"
                    formControlName="dataType"
                    class="form-select"
                    aria-label="Default select example"
                  >
                    <option value="" [selected]="isSelected">--Please Select---</option>
                    <option value="numeric">
                      Numeric
                    </option>
                    <option value="alphaNumeric">
                      Alpha Numeric
                    </option>
                    <option value="date">
                      Date
                    </option>
                  </select>
                </td>
                <td>
                  <input
                  id="responseIndicator_{{ i }}"
                  formControlName="defaultValue"
                  type="text"
                  class="form-control"
                  value=""
                />
                </td>
                <td>
                  <select
                    id="encryption_{{ i }}"
                    formControlName="encryption"
                    class="form-select"
                    aria-label="Default select example"
                    (change)="onSelectionOFMessageType($event)"
                  >
                    <option value="" [selected]="isSelected">--Please Select---</option>
                    <option value="No Encryption">No Encryption</option>
                    <option value="BASE64">
                      BASE64
                    </option>
                    <option value="SHA264">
                      SHA264
                    </option>
                    <option value="SHA512">
                      SHA512
                    </option>
                  </select>
                </td>
                <td class="tblIcon">
                  <a *ngIf="submitFlag" href="javascript:void(0);"  (click)="removeTranslation(i)" class="deleteIcon2"><img src="assets/images/delete-icon.svg" alt="..."></a>
                  <!-- <button *ngIf="submitFlag" (click)="removeTranslation(i)" class="deleteIcon2"
                    ><img src="assets/images/delete-icon.svg" alt="..."
                  /></button> -->
                </td>
              </ng-container>
            </tr>
          </ng-container>

          <tr>
            <td>
              <button *ngIf="submitFlag" (click)="addTransaltionGroup()" class="addIcon primarybg">
                <span><img src="assets/images/plus-icon.svg" alt="..." /></span>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="row g-3 pb-3 justify-content-end pt-3">
      <div class="col-auto">
        <button (click)="onSubmit()" [disabled]="!submitFlag||ruleTransForm.invalid" class="btn smBtn minWdSmBtn btnPrimary">Submit</button>
      </div>
      <div class="col-auto">
        <button type="reset" (click)="onReset()" [disabled]="!submitFlag" class="btn smBtn minWdSmBtn btnSecondary"
          >Reset</button>
      </div>
    </div>
  </div>
</fieldset>
  </form>
  <br>
  <div class="dbCardStyle" *ngIf="showAuditLog">
    <div class="row">
      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="csCardStyle">
          <div class="row g-2 align-items-center">
            <div class="col-auto">
              <div class="csCardStyleIcon csCardStyleIconBg1">
                <img src="assets/images/maker-icon.svg" alt="..." />
              </div>
            </div>
            <div class="col">
              <div class="csCardStyleText">
                <h2>Maker</h2>
                <p>Lorem Ipsum</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="csCardStyle">
          <div class="row g-2 align-items-center">
            <div class="col-auto">
              <div class="csCardStyleIcon csCardStyleIconBg2">
                <img src="assets/images/time-stamp-icon.svg" alt="..." />
              </div>
            </div>
            <div class="col">
              <div class="csCardStyleText">
                <h2>Maker Time Stamp</h2>
                <p>04June, 2021, 12:00 AM</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="csCardStyle">
          <div class="row g-2 align-items-center">
            <div class="col-auto">
              <div class="csCardStyleIcon csCardStyleIconBg3">
                <img src="assets/images/record-status-icon.svg" alt="..." />
              </div>
            </div>
            <div class="col">
              <div class="csCardStyleText">
                <h2>Record Status</h2>
                <p>Open</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="csCardStyle">
          <div class="row g-2 align-items-center">
            <div class="col-auto">
              <div class="csCardStyleIcon csCardStyleIconBg4">
                <img src="assets/images/checker-icon.svg" alt="..." />
              </div>
            </div>
            <div class="col">
              <div class="csCardStyleText">
                <h2>Checker</h2>
                <p>Lorem Ipsum</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="csCardStyle">
          <div class="row g-2 align-items-center">
            <div class="col-auto">
              <div class="csCardStyleIcon csCardStyleIconBg5">
                <img src="assets/images/checker-time-icon.svg" alt="..." />
              </div>
            </div>
            <div class="col">
              <div class="csCardStyleText">
                <h2>Checker Time Stamp</h2>
                <p>Lorem Ipsum</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="csCardStyle">
          <div class="row g-2 align-items-center">
            <div class="col-auto">
              <div class="csCardStyleIcon csCardStyleIconBg6">
                <img src="assets/images/first-auth-icon.svg" alt="..." />
              </div>
            </div>
            <div class="col">
              <div class="csCardStyleText">
                <h2>First Time Auth</h2>
                <p>No</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="csCardStyle">
          <div class="row g-2 align-items-center">
            <div class="col-auto">
              <div class="csCardStyleIcon csCardStyleIconBg7">
                <img src="assets/images/auth-status-icon.svg" alt="..." />
              </div>
            </div>
            <div class="col">
              <div class="csCardStyleText">
                <h2>Auth Status</h2>
                <p>Open</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-md-4 col-lg-3">
        <div class="csCardStyle">
          <div class="row g-2 align-items-center">
            <div class="col-auto">
              <div class="csCardStyleIcon csCardStyleIconBg7">
                <img src="assets/images/first-auth-icon.svg" alt="..." />
              </div>
            </div>
            <div class="col">
              <div class="csCardStyleText">
                <h2>Modification Number</h2>
                <p>1</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
