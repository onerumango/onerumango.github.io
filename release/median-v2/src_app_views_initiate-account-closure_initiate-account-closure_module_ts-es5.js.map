<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Account Closure Summary</h2>
  </div>
  <div class="dbCardStyle">
    <div class="row g-3 pb-3 justify-content-end">
      <div class="col-auto">
        <a [routerLink]="[ '/initiate-account-closure/create' ]" class="btn smBtn minWdSmBtn btnPrimary">New</a>
      </div>
      <div class="col-auto">
        <a [routerLink]="[ '/dashboard' ]" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
      </div>
    </div>
    <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger"
     class="dataTable table tableStyle responsive nowrap" style="width:100%">
    <!-- <table id="dbTable1" datatable class="dataTable table tableStyle responsive nowrap" style="width:100%"> -->
      <thead>
        <tr>
          <th>closure type</th>
          <th>account type</th>
          <th>account number</th>
          <th>file name</th>
          <th>status</th>
          <th>maker id</th>
        </tr>
      </thead>
      <tbody>
        <!-- <tr> -->
        <tr *ngFor="let users of summaryDetails">
          <td>
            <a routerLink="/initiate-account-closure/create/{{users.closureType}}" (click)="getDataFromSummary(users)" class="primaryColor">{{users.closureType}}</a></td>
          <td>{{users.accountType}}</td>
          <td>{{users.accountNumber}}</td>
          <td>{{users.fileName}}</td>
          <td>{{users.status}}</td>
          <td>{{users.makerId}}</td>
        </tr>
 
      </tbody>
    </table>
  </div>
</div>
