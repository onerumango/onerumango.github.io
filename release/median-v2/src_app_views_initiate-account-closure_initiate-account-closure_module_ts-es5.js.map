<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Account Closure</h2>
  </div>
  <form action="" class="formStyle" [formGroup]="accountClosureForm">
    <div class="dbCardStyle cardWidth">
      <div class="row gy-4 justify-content-center">
        <div class="col-12">
          <div class="row g-2 justify-content-center">
            <div class="col-sm-4 col-5">
              <div class="radio radioStyle">
                <input [readonly]="editFlag" id="radio-1" name="radio" type="radio" checked (click)="onClickOfBulk()">
                <label for="radio-1" class="radio-label">Bulk</label>
              </div>
            </div>
            <div class="col-sm-4 col-5">
              <div class="radio radioStyle">
                <input [readonly]="editFlag" id="radio-2" name="radio" type="radio" (click)="onclickOfSingle()">
                <label  for="radio-2" class="radio-label">Single</label>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12">
          <label for="roleName" class="formLbl">Account Type</label>
          <select class="form-select" formControlName="accountType" [(ngModel)]="fetchUserSingle.accountType" aria-label="Default select example">
            
            <option value="dormant">Dormant </option>
            <option value="overDrawn">OverDrawn Accounts</option> 
            <option value="unclaimed">Unclaimed </option>
          </select>
          <div class="errorColor" *ngIf="accountClosureForm.controls['accountType'].invalid && (accountClosureForm.controls['accountType'].dirty || accountClosureForm.controls['accountType'].touched)">
            <div *ngIf="accountClosureForm.controls['accountType'].errors.required">
            Please Select Account Type
          </div>
        </div>
        </div>
        <div class="col-12" *ngIf="singleCall">
          <label for="roleName" class="formLbl">Account Number</label>
          <input id="accountNumber" placeholder="Account Number" required [readonly]="editFlag" [(ngModel)]="fetchUserSingle.accountNumber"
          formControlName="accountNumber" class="form-control" value="">
          <div class="errorColor" *ngIf="accountClosureForm.controls['accountNumber'].invalid && (accountClosureForm.controls['accountNumber'].dirty || accountClosureForm.controls['accountNumber'].touched)">
            <div *ngIf="accountClosureForm.controls['accountNumber'].errors.required">
            Please Enter Account Number
          </div>
        </div>
        </div>
        <div class="col-12" *ngIf="singleCall">
          <label for="roleName" class="formLbl">Branch Code</label>
          <input id="branchCode" placeholder="Branch Code" required [readonly]="editFlag" [(ngModel)]="fetchUserSingle.branchCode"
          formControlName="branchCode" class="form-control" value="">
          <div class="errorColor" *ngIf="accountClosureForm.controls['branchCode'].invalid && (accountClosureForm.controls['branchCode'].dirty || accountClosureForm.controls['branchCode'].touched)">
            <div *ngIf="accountClosureForm.controls['branchCode'].errors.required">
            Please Enter Branch Code
          </div>
        </div>
        </div>

        <div class="col-12" *ngIf="singleCall">
          <label for="roleName" class="formLbl">Reason For Closure</label>
          <input id="" placeholder="Reason For Closure" required [readonly]="editFlag" [(ngModel)]="fetchUserSingle.reasonForClosure"
          formControlName="reasonForClosure"  class="form-control" value="">
          <div class="errorColor" *ngIf="accountClosureForm.controls['reasonForClosure'].invalid && (accountClosureForm.controls['reasonForClosure'].dirty || accountClosureForm.controls['reasonForClosure'].touched)">
            <div *ngIf="accountClosureForm.controls['reasonForClosure'].errors.required">
            Please Enter Reason For Closure
          </div>
        </div>
        </div>
        <div class="col-12" *ngIf="!singleCall">
          <div class="fileUpload">
           <div class="formS">
              <div class="file-upload-wrapper" data-text="File Upload">
                <input [readonly]="editFlag" (change)="selectFile($event)" name="file-upload-field" type="file" class="file-upload-field" value="">
              </div>
            </div>
          </div>
          <p style="font-size: 11px;color:#a30202">{{fileName}}</p>
        </div>
        <div class="col-12"  *ngIf="!modifyScreen">
          <div class="row g-3 pb-3 justify-content-center pt-3">
            <div class="col-auto" *ngIf="!singleCall">
              <button href="javascript:void(0)" class="btn smBtn minWdSmBtn btnPrimary" [disabled]="submitFile &&accountClosureForm.controls['accountType'].invalid" (click)="onSubmitFile()">Submit File</button>
            </div>
            <div class="col-auto" *ngIf="singleCall">
              <button href="javascript:void(0)" class="btn smBtn minWdSmBtn btnPrimary" [disabled]="accountClosureForm.invalid" (click)="onSubmitSingle($event)">Submit</button>
            </div>
            <div class="col-auto">
              <button routerLink="/initiate-account-closure" class="btn smBtn minWdSmBtn btnSecondary">Exit</button>
            </div>
            <div class="col-auto">
              <button (click)="generateExcel()" class="btn smBtn minWdSmBtn btnPrimary">View Report</button>
            </div>
          </div>
        </div>
        <div class="col-12"  *ngIf="modifyScreen || editFlag">
          <div class="row g-3 pb-3 justify-content-center pt-3">
            <div class="col-auto" >
              <button href="javascript:void(0)" class="btn smBtn minWdSmBtn btnPrimary">Submit File</button>
            </div>
            <div class="col-auto">
              <button routerLink="/initiate-account-closure" class="btn smBtn minWdSmBtn btnSecondary" (click)="editValues()">Exit</button>
            </div>
            <div class="col-auto" *ngIf="editFlag">
              <button class="btn smBtn minWdSmBtn btnPrimary" (click)="editValues()">Edit</button>
            </div>
            <div class="col-auto" *ngIf="!editFlag">
              <button href="javascript:void(0)" class="btn smBtn minWdSmBtn btnPrimary"
              >Update</button>
            </div>
            <div class="col-auto" *ngIf="this.fetchUserSingle.closureType=='SINGLE'">
              <button class="btn smBtn minWdSmBtn btnPrimary" (click)="onClickOfViewToData()">View Report</button>
            </div>
            <div class="col-auto" *ngIf="this.fetchUserSingle.closureType=='BULK'">
              <button (click)="onClickOfViewToDatabulk()" class="btn smBtn minWdSmBtn btnPrimary">View Report</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
