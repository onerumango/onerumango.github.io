<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Account Closure Maintenance Summary</h2>
  </div>
  <div class="dbCardStyle">
    <div class="row g-3 pb-3 justify-content-end">
      <div class="col-auto">
        <a (click)="new()" class="btn smBtn minWdSmBtn btnPrimary">New</a>
      </div>
      <div class="col-auto">
        <a href="javascript:void(0)" class="btn smBtn minWdSmBtn btnSecondary" [routerLink]="['/dashboard']">Exit</a>
      </div>
    </div>
    <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger"
      class="dataTable table tableStyle responsive nowrap" style="width:100%">

      <thead>
        <tr>
          <th>Account Type</th>

          <th>Maker Id</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let data of respArray ">
          <td><a href="javascript:void(0)" (click)="edit(data)" class="primaryColor">{{data.accountType}}</a></td>
          <td>{{data.inputBy}}</td>

        </tr>
      </tbody>
    </table>
  </div>
</div>
