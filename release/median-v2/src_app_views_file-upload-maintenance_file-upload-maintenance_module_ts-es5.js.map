<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Treasury Reference Input</h2>
  </div>
  <form [formGroup]="treasuryReferenceForm" action="" class="formStyle">
    <div class="dbCardStyle">
      <div class="row gy-4">
        <div class="col-lg-4">
          <label for="selectBatch" class="formLbl">Select Batch No</label>
          <select class="form-select" (change)='onOptionsChange($event)' formControlName="batch"
            aria-label="Default select example">
            <option class="form-class" hidden value="" disabled selected>--Select Batch No--</option>
            <option *ngFor="let batch of selectedBatchNumber" [value]="batch"> {{batch}}</option>
          </select>
        </div>
      </div>
    </div>
  </form>
  <br>
  <div class="dbCardStyle dbCardStyle2 p-0" *ngIf="showTable">
    <div class="titleCol">
      <h4></h4>
    </div>
    <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" id="dbTable1"
      class="dataTable table tableStyle responsive nowrap" style="width:100%">
      <thead>
        <tr>
          <th>Batch No</th>
          <th>Branch Code</th>
          <th>Curr No</th>
          <th>Initiation Date</th>
          <th>Source Code</th>
          <th>Account</th>
          <th>Amount</th>
          <th>Treasury Reference</th>
        </tr>
      </thead>
      <tbody>
    
        <tr *ngFor="let data of treasuryReferenceData">
          <td>{{data.id.batchNo}}</td>
         <td>{{data.id.branchCode}}</td>
         <td>{{data.id.currNo}}</td>
         <td>{{data.id.initiationDate|date}}</td>
         <td>{{data.id.sourceCode}}</td>
         <td>{{data.account}}</td>
         <td>{{data.amount}}</td>
         <td>
         
          <textarea   type="text" class="form-control"
            placeholder="Treasury Reference" value=""></textarea>
        </td>
        </tr>

      </tbody>
    </table>
    <ng-container *ngIf="isLoading">
      <div class="loading-page-center">
        <span class="indicator-progress">Please wait...
          <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
      </div>
    </ng-container>
    
  </div>
  <div *ngIf="treasuryReferenceForm.controls['batch'].value" class="row g-3 pb-3 pt-4 justify-content-end">
    <div class="col-auto">
      <button type="button" class="btn smBtn minWdSmBtn btnPrimary" (click)="onSaveOfFcyDealNumber(treasuryReferenceData)"
        [disabled]="disbaleSave">Save</button>
    </div>
    <div class="col-auto">
      <button type="button" class="btn smBtn minWdSmBtn btnSecondary" routerLink="/dashboard">Exit</button>
    </div>
  </div>

</div>
