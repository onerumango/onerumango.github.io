<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Process Code Mapping</h2>
    </div>
    <form [formGroup]="processCodeForm" action="" class="formStyle">
      <div class="dbCardStyle">
        <div class="row gy-3">
          <div class="col-lg-3">
            <label for="extCode" class="formLbl">External System Code</label>
            <select class="form-select" placeholder="External System Code" (change)='onOptionsChange($event)' formControlName="extSysCode" aria-label="Default select example">
              <option class="form-class"  disabled selected>Select External System Code</option>
              <option  *ngFor="let extCode of extSysCodeData" [value]="extCode.extSysCode"> {{extCode.extSysCode}}</option>
           
            </select>
          </div>
          <div class="col-lg-3">
            <label for="processCode"   class="formLbl">External System Name</label>
            <input id="processCode" formControlName="extSysName" type="text" class="form-control" placeholder="External System Name" value="">
          </div>
          <div class="col-lg-3">
            <label for="extName" class="formLbl">Process Code</label>
            <input id="extName" type="text" formControlName="processCode" class="form-control" placeholder="Process Code" value="">
          </div>
          <div class="col-lg-3">
            <label for="uploadLimit" class="formLbl">Maximum Upload Limit</label>
            <input id="uploadLimit" formControlName="maxUploadLimit" type="number" class="form-control" placeholder="Maximum Upload Limit" value="">
          </div>
     
          <div class="col-lg-12">
            <div class="row gy-3">
              <div class="col-lg-3">
                <div class="checkStyle">
                  <input type="checkbox" (change)='treasuryRequired($event)' formControlName="treasuryrefRequired"  id="referenceRequired">
                  <label for="referenceRequired">Treasury Reference Required</label>
                </div>
              </div>
              <div class="col-lg-3">
              </div>
              <div class="col-lg-3">
              </div>
              <div class="col-lg-3">
                <label *ngIf="showsftpValues">SFTP Details</label>
                <input id="sftpUsername" formControlName="sftpUsername" *ngIf="showsftpValues"  type="text" class="form-control" placeholder="Username" value="">
              </div>
            </div>
          </div>
          <div class="col-lg-12">
            <div class="row gy-4 align-items-center">
              <div class="col-lg-3">
                <div class="checkStyle">
                  <input type="checkbox" (change)="autoUploadRequired($event)" formControlName="autoUpload" id="autoUpload">
                  <label for="autoUpload">Auto Upload</label>
                </div>
              </div>
              <div class="col-lg-3">
                <input id="fileName" type="text"  *ngIf="showFilefield" formControlName="fileName" class="form-control" placeholder="File Name" value="">
              </div>
              <div class="col-lg-3">
                <input id="filePath" type="text" *ngIf="showFilefield" formControlName="filePath" class="form-control" placeholder="File Path" value="">
              </div>
              <div class="col-lg-3">
                <input id="sftpIpaddress" type="text" formControlName="sftpIpaddress" *ngIf="showsftpValues"  class="form-control" placeholder="Password" value="">
              </div>
            </div>
          </div>
          <div class="col-lg-12">
            <div class="row gy-4 align-items-center">
              <div class="col-lg-3">
                <div class="checkStyle">
                  <input type="checkbox" (change)="backdatingRequired($event)" formControlName="backDateAllow"  id="backDateAllow" >
                  <label for="backDateAllow">Back Dating</label>
                </div>
              </div>
              <div class="col-lg-3">
                <input id="bdav" type="text"  *ngIf="showbackDateValue" formControlName="bdav" class="form-control" placeholder="Back Dating" value="">
              </div>
              <div class="col-lg-3">
              </div>
              <div class="col-lg-3">
                <input id="sftpPort" type="text" formControlName="sftpIpaddress" *ngIf="showsftpValues"  class="form-control" placeholder="IP Address" value="">
              </div>
       
            </div>
          </div>
          <div class="col-lg-12">
            <div class="row gy-4 align-items-center">
              <div class="col-lg-3">
                <div class="checkStyle">
                  <input type="checkbox" (change)="futureDateAllowRequired($event)" formControlName="futureDateAllow" id="futureDating">
                  <label for="futureDating">Future Dating</label>
                </div>
              </div>
              <div class="col-lg-3">
                <input id="futureDating" type="text" *ngIf="showFutureDate" formControlName="fdav" class="form-control" placeholder="Future Dating" value="">
              </div>
              <div class="col-lg-3">
              </div>
              <div class="col-lg-3">
                <input id="sftpPort" type="text" formControlName="sftpPort" *ngIf="showsftpValues"  class="form-control" placeholder="Port" value="">
              </div>
              
            </div>
          </div>
          <div class="col-lg-12">
            <div class="row gy-4 align-items-center">
              <div class="col-lg-3">
                <div class="checkStyle">
                  <input type="checkbox" (change)=fCYExchangeRequired($event) formControlName="fCYRateVariance" id="fCYRateVariance">
                  <label for="fCYRateVariance">FCY Exchange Rate Variance</label>
                </div>
              </div>
              <div class="col-lg-3">
                <input id="fCYPercentage" type="number" *ngIf="showfCYExchangeValue" formControlName="fCYPercentage" class="form-control" placeholder="FCY Percentage" value="">
              </div>
              <div class="col-lg-3">
              </div>
              <div class="col-lg-3">
                <input id="sftpPath" type="text" formControlName="sftpPath" *ngIf="showsftpValues"  class="form-control" placeholder="Path" value="">
              </div>
            </div>
          </div>
              

      
     
          <div class="col-12">
            <div class="row">
              <div class="col-lg-3">
  
                <div class="checkListCol mt-2 pt-3">
                  <div class="checkStyle">
                    <input type="checkbox" formControlName="acft" id="uppercaseCheck">
                    <label for="uppercaseCheck">Cross Financial Transaction</label>
                  </div>
                  <div class="checkStyle">
                    <input type="checkbox" formControlName="mandatoryFieldImposed" id="lowercaseCheck">
                    <label for="lowercaseCheck">Mandatory Field Impose</label>
                  </div>
                  <div class="checkStyle">
                    <input type="checkbox" formControlName="sftpRequired" (change)="sftpRequired($event)"  id="numberCheck">
                    <label for="numberCheck">SFTP Required</label>
                  </div>
                  <div class="checkStyle">
                    <input type="checkbox" formControlName="wuFile" id="charactersCheck">
                    <label for="charactersCheck">WU File Upload</label>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="row g-3 pb-3 justify-content-end pt-3">
          <div class="col-auto">
            <button  [disabled]="!processCodeForm.valid" (click)="finalSubmitofForm(processCodeForm.value)" class="btn smBtn minWdSmBtn btnPrimary">Save</button>
          </div>
          <div class="col-auto">
            <a href="javascript:void(0)" [routerLink]="['/dashboard']" routerLinkActive="router-link-active"  class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
          </div>
        </div>
      </div>
    </form>
  </div>
