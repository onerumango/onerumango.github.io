<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">External System</h2>
    </div>
    <div class="dbCardStyle">
      <div class="row g-3 pb-3 justify-content-end">
        <div class="col-auto">
          <a [routerLink]="[ '/external-system/external-system-new' ]" [routerLinkActive]="['active']" class="btn smBtn minWdSmBtn btnPrimary">New</a>
        </div>
        <div class="col-auto">
          <a href="javascript:void(0)" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
        </div>
      </div>
      <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" id="dbTable1" class="dataTable table tableStyle responsive nowrap" style="width:100%">
        <thead>
          <tr>
            <th>External System Code</th>
            <th>External System Code</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of externalSummaryData">
            <td><span class="primaryColor"  (click)="sendingDataforEdit(item)">{{item.extSysCode}}</span></td>
            <td>{{item.extSysName}}</td>
            <td>{{item.authStatus}}</td>
            <td>{{item.modifiedTime | date: 'medium'}}</td>
          </tr>
     
        </tbody>
      </table>
    </div>
  </div>
