<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Treasury Reference Input</h2>
    </div>
    <form [formGroup]="treasuryReferenceForm" action="" class="formStyle">
      <div class="dbCardStyle">
        <div class="row gy-4">
          <div class="col-lg-4">
            <label for="selectBatch" class="formLbl">Select Batch No</label>
            <select class="form-select" (change)='onOptionsChange($event)' formControlName="batch" aria-label="Default select example">
              <option class="form-class"  disabled selected>Select Batch No</option>
              <option  *ngFor="let batch of selectedBatchNumber" [value]="batch"> {{batch}}</option>
            </select>
          </div>
        </div>
      </div>
    </form>
  </div>
