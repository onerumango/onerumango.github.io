<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Excel Mapping</h2>
    </div>
    <div class="dbCardStyle">
      <div class="row g-3 pb-3 justify-content-end">
        <div class="col-auto">
          <a href="excel-mapping-new.html" [routerLink]="['/excel-mapping/excel-mapping-edit']" routerLinkActive="router-link-active"  class="btn smBtn minWdSmBtn btnPrimary">Update Mapping</a>
        </div>
        <div class="col-auto">
          <a href="javascript:void(0)" [routerLink]="['/dashbaord']" routerLinkActive="router-link-active"  class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
        </div>
      </div>
      <form [formGroup]="excelMappingForm" action="" class="formStyle">
        <div class="titleStyle mt-2 mb-4">
          <h2 class="pageTitle darkgreyClr">Select Minimum two mandatory row</h2>
        </div>
        <div class="row gy-4 align-items-end">
          <div class="col-lg-4">
            <label for="extSystem" class="formLbl">External System</label>
            <select class="form-select"  (change)="getProcess(excelMappingForm.get('extCode').value)"
            formControlName="extCode" required aria-label="Default select example">
              <option class="form-class" selected>Select External System </option>
              <option class="form-class" *ngFor="let data of extSysData" [value]="data">{{data}}</option>
           
            </select>
          </div>
          <div class="col-lg-4">
            <label for="proCode" class="formLbl">Process Code</label>
            <select class="form-select" (change)="getProcessName(excelMappingForm.get('proCode').value,excelMappingForm.get('extCode').value)"
            formControlName="proCode" required aria-label="Default select example">
              <option class="form-class" selected>Process Code</option>
              <option class="form-class" *ngFor="let data of processName" [value]="data">{{data}}</option>
            
            </select>
          </div>
          <div class="col-lg-4">
            <label for="startingRow" class="formLbl">Data Starting Row</label>
            <input id="startingRow" type="number" formControlName="startingRow"  required class="form-control" placeholder="Data Starting Row" value="">
          </div>
          <div class="col-lg-4">
            <label for="currency" class="formLbl">Currency</label>
            <input id="currency" type="text" class="form-control" formControlName="currency" name="currency" required placeholder="Currency" value="">
          </div>
          <div class="col-lg-4">
            <label for="sheetNumber" class="formLbl">Sheet Number</label>
            <input id="sheetNumber" type="text" class="form-control" formControlName="sheetNumber" placeholder="Sheet Number" value="">
          </div>
          <div class="col-lg-4">
            <div class="checkStyle">
              <input type="checkbox" id="fcyRate" formControlName="headerRepeated">
              <label for="fcyRate">Is Header Present</label>
            </div>
          </div>
        </div>
      </form>
    </div>
    <div class="dbCardStyle">
      <form action="" [formGroup]="addForm" novalidate class="formStyle">
        <div class="table-responsive" >
          <table id="dbTable1" class="table tableStyle responsive nowrap vAlignMdl">
            <thead>
              <tr>
                <th>Name</th>
                <th>data type</th>
                <th>mandatory</th>
                <th>header name</th>
                <th>date format</th>
                <th>mapping column</th>
                <th>delimeter</th>
                <th>default value</th>
                <th>repeated till next value</th>
                <th>delete</th>
              </tr>
            </thead>
            <tbody formArrayName="subArray">
              <tr *ngFor="let item of addForm.get('subArray')['controls']; let i=index" [formGroupName]="i">
                <td>
                  <input id="sourceCode" type="text" formControlName="columnnName" class="form-control" placeholder="Name" value="">
                </td>
                <td>
                  <select class="form-select" formControlName="dataType" placeholder="Choose DataType"
                  (change)="checkTypeStatus(i)" aria-label="Default select example">
                    <option class="form-class" selected>Data Type</option>
                    <option class="form-class" *ngFor="let item of dataTypes" [value]="item.type">{{item.type}}</option>
                  </select>
                </td>
                <td>
                  <div class="checkStyle">
                    <input type="checkbox" formControlName="mandatory" id="mandatoryCheck" >
                    <label for="mandatoryCheck"></label>
                  </div>
                </td>
                <td>
                  <input id="headerName" type="text" formControlName="headerName" class="form-control" placeholder="Header Name" value="">
                </td>
                <td>
                  <input id="dateFormat" type="text" class="form-control"  formControlName="dateFormat" placeholder="Date Format" value="">
                </td>
                <td>
                  <input id="mappingColumn" type="text" class="form-control" formControlName="mappingColumn" placeholder="Mapping Column" value="">
                </td>
                <td>
                  <input id="delimeter" type="text" class="form-control" formControlName="delimeter" placeholder="Delimeter" value="">
                </td>
                <td>
                  <input id="defaultValue" type="text" class="form-control" formControlName="defaultValue"
                      placeholder="Default Value" value="">
              </td>
              <td>
                  <input id="repeatedTillNextValue" type="text" class="form-control" formControlName="repeatedTillNextValue"
                      placeholder="Repeated Till Next Value" value="">
              </td>
              <td>
                <button href="javascript:void(0)" class="deleteIcon2" >
                  <span (click)="removeSubArray(i)" ><img src="assets/images/delete-icon.svg" alt="..."></span>
                </button>
              </td>
              </tr>
             <tr>
                <td>
                  <button href="javascript:void(0)" class="addIcon primarybg" [attr.disabled]="!addForm.controls.subArray.valid ? true : null" >
                    <span (click)="addSubArray()" ><img src="assets/images/plus-icon.svg" alt="..."></span>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="row g-3 pb-3 justify-content-end pt-3">
        <div class="col-auto">
          <!-- [attr.disabled]="excelMappingForm.invalid " -->
          <button href="javascript:void(0)"   (click)="finalSubmit(excelMappingForm.value,addForm.value)" class="btn smBtn minWdSmBtn btnPrimary">Submit</button>
        </div>
        <div class="col-auto">
          <a href="javascript:void(0)" [routerLink]="['/excel-mapping']" routerLinkActive="router-link-active"  class="btn smBtn minWdSmBtn btnSecondary">Cancel</a>
        </div>
      </div>
      </form>
    </div>
  </div>
