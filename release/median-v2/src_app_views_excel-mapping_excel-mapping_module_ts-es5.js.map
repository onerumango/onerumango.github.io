<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Template Mapping Summary</h2>
    </div>
    <div class="dbCardStyle">
      <div class="row g-3 pb-3 justify-content-end">
        <div class="col-auto"  *ngIf="roleCodes.new">
           
          <a [routerLink]="[ '/excel-mapping/excel-mapping-new' ]" class="btn smBtn minWdSmBtn btnPrimary">{{roleCodes.new.labelDescription}}</a>
        </div>
        <div class="col-auto">
          <a  class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
        </div>
      </div>
      <table id="dbTable1" datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="dataTable table tableStyle responsive nowrap" style="width:100%">
        <thead>
          <tr>
            <th>External System Code</th>
            <th>External system name</th>
            <th>input by</th>
            <th>auth status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let exdata of excelData ">
            <td><span class="primaryColor" style="cursor: pointer;" (click)="setDataFromSummaryToUpdateExcelMapping(exdata)">{{exdata.extSysCode}}</span></td>
            <td>{{exdata.extSys}}</td>
            <td>{{exdata.inputBy}}</td>
            <td>{{exdata.authStatus}}</td>
            <td>{{exdata.inputDtStamp | date: 'medium'}}</td>
          </tr>
 
        </tbody>
      </table>

      <ng-container *ngIf="isLoading">
        <div class="loading-page-center">
          <span class="indicator-progress">Please wait...
            <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
        </div>
      </ng-container>
    </div>
  </div>
