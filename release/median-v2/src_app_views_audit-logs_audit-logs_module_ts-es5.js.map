<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Audit Logs</h2>
    </div>
   
      <div class="col-2" *ngIf="!isLoading">
        <label for="roleName" class="formLbl">Export As</label>
        <select class="form-select"  aria-label="Default select example" (change)="modo($event.target.value)">
          <!-- <option>--Choose file type--</option> -->
          <option disabled selected value="Excel">Excel</option>
          <option value="PDF">PDF</option>
        </select>
      
      </div><br>
      <div class="dbCardStyle">
        <table id="auditLogsTable" datatable [dtOptions]="dtOptions" class="dataTable table tableStyle responsive nowrap" 
            style="width:100%">
          <thead>
            <tr>
              <th>Screen</th>
              <th>Creator</th>
              <th>Action Perform By</th>
              <th>Record</th>
              <th>Action</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody *ngIf="auditlogdata?.length != 0">
            <tr *ngFor="let audits of auditlogdata">
              <td>{{audits.log}}</td>
              <td>{{audits.creatorId}}</td>
              <td>{{audits.actionPerformBy}}</td>
              <td>{{audits.record}}</td>
              <td>{{audits.action}}</td>
              <td>{{audits.creatorDtStamp | date:'medium'}}</td>
            </tr>
          </tbody>
          <tbody *ngIf="auditlogdata?.length == 0">
            <tr>
              <td colspan="3" class="no-data-available">No data!</td>
            </tr>
          </tbody>        
        </table>
        <ng-container *ngIf="isLoading">
          <div class="loading-page-center">
            <span class="indicator-progress">Please wait...
              <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
          </div>
        </ng-container>
      </div>

</div>
