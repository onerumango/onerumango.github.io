<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Rule Translation</h2>
    </div>
    <div class="dbCardStyle">
      <div class="row g-3 pb-3 justify-content-end">
        <div class="col-auto">
          <a [routerLink]="['/rule-translation/create']" [routerLinkActive]="['active']" class="btn smBtn minWdSmBtn btnPrimary">New</a>
        </div>
        <div class="col-auto">
          <a [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
        </div>
      </div>
      <table datatable id="dbTable1" [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="dataTable table tableStyle responsive nowrap" style="width:100%">
        <thead>
          <tr>
            <th>ID</th>
            <th>System Code</th>
            <th>Operation Name</th>
            <th>Service Name</th>
            <th>Maker</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of translationList">
            <td> <a style="cursor: pointer;" (click)="onGetId(data)" class="primaryColor">{{ data.transId }}</a></td>
            <td>{{ data.systemCode }}</td>
            <td>{{ data.operationName }}</td>
            <td>{{ data.serviceName }}</td>
            <td>{{ data.creatorId }}</td>
            <td>{{ data.createdTime | date:'medium' }}</td>
            <!-- <td>
              <button class="btn btn-sm btn-outline-light primaryColor">
                <i class="fa fa-pencil fa-lg"></i>
              </button>
              <button class="m-1 btn btn-sm btn-outline-light primaryColor">
                <i class="fa fa-trash fa-lg"></i>
              </button>
              <button class="m-1 btn btn-sm btn-outline-light primaryColor">
                <i class="fa fa-shield fa-lg"></i>
              </button>
              <button class="btn btn-sm btn-outline-light primaryColor">
                <i class="fa fa-times-circle-o fa-lg"></i>
              </button>
          
            </td> -->
          </tr>
        </tbody>
      </table>
    </div>


</div>
