<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Rule Mapping</h2>
  </div>
  <div class="dbCardStyle">
    <div class="row g-3 pb-3 justify-content-end">
      <div class="col-auto">
        <a [routerLink]="['/rule-mapping/create']" [routerLinkActive]="['active']" class="btn smBtn minWdSmBtn btnPrimary">New</a>
      </div>
      <div class="col-auto">
        <a [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
      </div>
    </div>
    <table datatable id="dbTable1" [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="dataTable table tableStyle responsive nowrap" style="width:100%">
      <thead>
        <tr>
          <th>Source Id</th>
          <th>Transaltion Id</th>
          <th>Record Status</th>
          <th>Maker Id</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let data of ruleMappingListResp">
          <td> <a style="cursor: pointer;" (click)="getById(data)" class="primaryColor">{{ data.sourceTranslationId }}</a></td>
          <td>{{ data.targetTranslationId }}</td>
          <td>{{ data.sourceOperation }}</td>
          <td>{{ data.creatorId }}</td>
          <td>{{ data.createdTime | date:'medium' }}</td>
        </tr>
      </tbody>
    </table>
  </div>


</div>
