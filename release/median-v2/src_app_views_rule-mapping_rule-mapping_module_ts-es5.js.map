<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Conversion</h2>
  </div>
  <div class="dbCardStyle">
    <div class="row g-3 pb-3 justify-content-end"></div>
    <form [formGroup]="conversionForm" novalidate>
      <div class="col-lg-3">
        <label style="font-weight: bold">Content Type</label>
        <select
          formControlName="Content_Type"
          class="form-select"
          aria-label="Default select example">
          <option value="xml">Xml</option>
          <option value="json">Json</option>
        </select>
      </div>
      <table style="width: 100%">
        <thead>
          <tr>
            <th>Request</th>
            <th></th>
            <th>Response Body</th>
          </tr>
        </thead>
        <tbody>
          <tr style="margin-top: 2%">
            <td>
              <textarea
                style="width: 80%"
                class="form-control rounded-0"
                id="exampleFormControlTextarea1"
                rows="15"
                formControlName="FCUBS_HEADER"
              ></textarea>
            </td>
            <td>
              <button
                class="btn smBtn minWdSmBtn btnPrimary"
                [disabled]="!conversionForm.valid"
                (click)="process()"
              >
                Process
              </button>
            </td>
            <td>
              <textarea
                style="width: 80%"
                class="form-control rounded-0"
                id="exampleFormControlTextarea1"
                rows="15"
              ></textarea>
            </td>
          </tr>
        </tbody>
      </table>
    </form>
  </div>
</div>
