<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Rule Mapping</h2>
    </div>
    <form class="formStyle" [formGroup]="ruleMappingForm" novalidate>
      <fieldset [disabled]="!submit">
      <div class="dbCardStyle">
        <div class="addformCol">
          <div class="row g-4 align-items-center">
            <div class="col">
              <div class="row gy-4 align-items-end">
                <div class="col-lg-3">
                  <label for="roleName" class="formLbl">Source System</label>
                  <select formControlName="systemCode" class="form-select" aria-label="Default select example" 
                          (change)="onSourseSelection($event)">
                          <option value="" [selected]="isSelected">
                            --Please Select---
                          </option>
                    <option *ngFor="let extsys of externalSystem" [value]="extsys" [hidden]="extsys === sourseSys">
                        {{extsys}}
                    </option>
                  </select>
                </div>
                <div class="col-lg-3">
                  <label for="roleName" class="formLbl">Message Type</label>
                  <select formControlName="messageType" class="form-select" aria-label="Default select example"
                          (change)="onSelectionOFMessageType($event)">
                          <option value="" [selected]="isSelected">
                            --Please Select---
                          </option>
                    <option value="I">
                        Incoming
                      </option>
                      <option value="O">
                        Outgoing
                      </option>
                  </select>
                </div>
                <div class="col-lg-3">
                  <label for="roleName" class="formLbl">Service Name</label>
                  <input
                    type="text"
                    id="ruleName"
                    name="serviceNameS"
                    class="form-control"
                    placeholder="Service Name"
                    formControlName="serviceName"
                    readonly
                    />
                </div>
                <div class="col-lg-3">
                  <label for="roleName" class="formLbl">Operation Name</label>
                  <input
                    type="text"
                    id="ruleName"
                    formControlName="operationName"
                    name="operationNameS"
                    class="form-control"
                    placeholder="Operation Name"
                    readonly
                />
                </div>
                <ng-container formGroupName="destinationSystems">
                    <div class="col-lg-3">
                        <label for="roleName" class="formLbl">Destination System</label>
                        <select formControlName="systemCode" class="form-select" aria-label="Default select example"
                                (change)="ondestinationSource($event)">
                                <option value="" [selected]="isSelected">
                                    --Please Select---
                                  </option>
                                <option *ngFor="let extsys of externalSystem" [value]="extsys" [hidden]="extsys === sourseSys">
                                    {{extsys}}
                                </option>
                        </select>
                      </div>
                      <div class="col-lg-3">
                        <label for="roleName" class="formLbl">Message Type</label>
                        <select formControlName="messageType" class="form-select" aria-label="Default select example"
                              (change)="msgTypeOfDestination($event)">
                              <option value="" [selected]="isSelected">
                                --Please Select---
                              </option>
                            <option value="I">
                                Incoming
                              </option>
                              <option value="O">
                                Outgoing
                              </option>
                        </select>
                      </div>
                      <div class="col-lg-3">
                        <label for="roleName" class="formLbl">Service Name</label>
                        <input
                            type="text"
                            id="ruleName"
                            name="serviceNameD"
                            class="form-control"
                            placeholder="Service Name"
                            formControlName="serviceName"
                            readonly
                            />
                      </div>
                      <div class="col-lg-3">
                        <label for="roleName" class="formLbl">Operation Name</label>
                        <input
                            type="text"
                            id="ruleName"
                            name="operationNameD"
                            class="form-control"
                            placeholder="Service Name"
                            formControlName="operationName"
                            readonly
                            />
                      </div>
                </ng-container>
              
                <div class="col-lg-3">
                    <!-- [disabled]="!ruleMapping.valid ||showfetchAll" -->
                  <button  (click)="fetchDestination()" 
                          class="btn minWdSmBtn btnPrimary">
                          Fetch
                  </button>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="dbCardStyle" *ngIf="showSource ||showDestination">
        <div class="addformCol" formArrayName="rulemappingDetail">
            <ng-container *ngFor="let item of rulemappingDetail.controls; let i = index">
                <ng-container [formGroupName]="i">
                    <div class="row g-4 align-items-center">
                        <div class="col">
                          <div class="row gy-4">
                            <div class="col-lg-4">
                              <label *ngIf="i == 0" for="roleName" class="formLbl">Source System</label>
                              <div class="row gy-4">
                                <div class="col-lg-12">
                                    <ng-container *ngIf="sourceLabel=='TCP/IP'">
                                        <label for="roleName" class="formLbl">Field No</label>
                                        <select formControlName="sourceKey"  (change)="onselectOfFieldNo($event,i)" class="form-select" aria-label="Default select example">
                                            <option *ngFor="let tag of sourceData" [hidden]="try(tag.messageBasis)" [value]="tag.messageBasis">{{tag.messageKey}}<{{tag.messageBasis}}</option>
                                          </select>
                                    </ng-container>
                                    <ng-container *ngIf="sourceLabel=='Https/Http'">
                                        <label for="roleName" class="formLbl">Tag</label>
                                        <select formControlName="sourceKey" class="form-select" aria-label="Default select example">
                                            <option *ngFor="let tag of sourceData" [value]="tag.messageBasis">{{tag.messageKey}}<{{tag.messageBasis}}</option>
                                          </select>
                                    </ng-container>
                                 
                                </div>
                                <!-- <div class="col-lg-6">
                                  <select class="form-select" aria-label="Default select example">
                                    <option selected>Field Name</option>
                                    <option value="1">One</option>
                                    <option value="2">Two</option>
                                    <option value="3">Three</option>
                                  </select>
                                </div> -->
                              </div>
                            </div>
                            <div class="col-lg-4">
                              <label for="roleName" *ngIf="i == 0" class="formLbl">Destination system</label>
                              <div class="row gy-4">
                                <div class="col-lg-12">
                                    <ng-container *ngIf="labelsDestination=='TCP/IP'">
                                        <label for="roleName" class="formLbl">Field No</label>
                                        <select formControlName="destinationKey"  (change)="onselectOfFieldNo2($event,i)" class="form-select" aria-label="Default select example">
                                            <option *ngFor="let fname of destinationData;let i=index" [hidden]="try2(fname.messageBasis)" [value]="fname.messageBasis">
                                                {{fname.messageKey}}<{{fname.messageBasis}}</option>
                                          </select>
                                    </ng-container>
                                    <ng-container *ngIf="labelsDestination=='Https/Http'">
                                        <label for="roleName" class="formLbl">Tag</label>
                                        <select formControlName="destinationKey" class="form-select" aria-label="Default select example">
                                            <option *ngFor="let fname of destinationData;let i=index" [value]="fname.messageBasis">
                                                {{fname.messageBasis}}</option>
                                          </select>
                                    </ng-container>
                                </div>
                                <!-- <div class="col-lg-6">
                                  <select class="form-select" aria-label="Default select example">
                                    <option selected>Tag Name</option>
                                    <option value="1">One</option>
                                    <option value="2">Two</option>
                                    <option value="3">Three</option>
                                  </select>
                                </div> -->
                              </div>
                            </div>
                            <div class="col-lg-4">
                              <label for="roleName" *ngIf="i == 0" class="formLbl">Default value</label>
                              <div class="row gy-4">
                                <div class="col-lg-12">
                                    <!-- <label for="defaultValue" class="formLbl">default value</label> -->
                                    <input
                                      type="text"
                                      id="defaultVal"
                                      class="form-control"
                                      formControlName="defaultValue"
                                      placeholder="Default value"
                                    />
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                        <div class="col-lg-4">
                          <a *ngIf="submit" href="javascript:void(0);" (click)="deleteRuleMapGroup(i)" class="deleteIcon2"><img src="assets/images/delete-icon.svg" alt="..."></a>
                         </div>
                        <!-- <div class="col-auto">
                          <div class="formDeleteCol mt-4">
                            <button *ngIf="submit" (click)="deleteRuleMapGroup(1)"><img src="assets/images/delete-icon.svg" alt="..."></button>
                          </div>
                        </div> -->
                      </div>
                     
                </ng-container>
            </ng-container>
        </div>
        <div class="row g-3 pt-4">
            <div class="col-auto">
              <button *ngIf="submit" (click)="addRuleDetail()" class="addIcon primarybg">
                <span><img src="assets/images/plus-icon.svg" alt="..."></span>
              </button >
            </div>
          </div>
        <div class="row g-3 pb-3 pt-4 justify-content-end">
          <div class="col-auto">
            <button (click)="onsaveRuleMapping()" [disabled]="!submit || !ruleMappingForm.valid" class="btn smBtn minWdSmBtn btnPrimary">
                Submit
            </button>
          </div>
          <div class="col-auto">
            <button
              class="btn smBtn minWdSmBtn btnSecondary" (click)="onReset()"
              >Reset</button
            >
          </div>
        </div>
      </div>
      </fieldset>
    </form>
  </div>
