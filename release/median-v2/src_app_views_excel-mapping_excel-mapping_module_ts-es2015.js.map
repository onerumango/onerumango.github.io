<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Excel Mapping</h2>
  </div>
  <div class="dbCardStyle">
    <div class="row g-3 pb-3 justify-content-end">
      <div class="col-auto">
        <a href="excel-mapping-new.html" [routerLink]="['/excel-mapping/excel-mapping-edit']"
          routerLinkActive="router-link-active" class="btn smBtn minWdSmBtn btnPrimary">Update Mapping</a>
      </div>
      <div class="col-auto">
        <a href="javascript:void(0)" [routerLink]="['/dashbaord']" routerLinkActive="router-link-active"
          class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
      </div>
    </div>
    <form [formGroup]="excelMappingForm" action="" class="formStyle">
      <div class="titleStyle mt-2 mb-4">
        <h2 class="pageTitle darkgreyClr">Select Minimum two mandatory row</h2>
      </div>
      <div class="row gy-4 align-items-end">
        <div class="col-lg-4">
          <label for="extSystem" class="formLbl">External System</label>
          <select class="form-select" [attr.disabled]="editFlag ? '' : null" (change)="getProcess(excelMappingForm.get('extCode').value)"
            formControlName="extCode" required aria-label="Default select example">
            <option class="form-class" selected>Select External System </option>
            <option class="form-class" *ngFor="let data of extSysData" [value]="data">{{data}}</option>

          </select>
        </div>
        <div class="col-lg-4">
          <label for="proCode" class="formLbl">Process Code</label>
          <select class="form-select" [attr.disabled]="editFlag ? '' : null"
            (change)="getProcessName(excelMappingForm.get('proCode').value,excelMappingForm.get('extCode').value)"
            formControlName="proCode"  required aria-label="Default select example">
            <option class="form-class" selected>Process Code</option>
            <option class="form-class" *ngFor="let data of processName" [value]="data">{{data}}</option>

          </select>
        </div>
        <div class="col-lg-4">
          <label for="startingRow" class="formLbl">Data Starting Row</label>
          <input id="startingRow" type="number" [readonly]="editFlag" formControlName="startingRow" required class="form-control"
            placeholder="Data Starting Row" value="">
        </div>
        <div class="col-lg-4">
          <label for="currency" class="formLbl">Currency</label>
          <input id="currency" type="text" class="form-control" [readonly]="editFlag" formControlName="currency" name="currency" required
            placeholder="Currency" value="">
        </div>
        <div class="col-lg-4">
          <label for="sheetNumber" class="formLbl">Sheet Number</label>
          <input id="sheetNumber" type="text" [readonly]="editFlag" class="form-control" formControlName="sheetNumber"
            placeholder="Sheet Number" value="">
        </div>
        <div class="col-lg-4">
          <div class="checkStyle"   >
            <input [attr.disabled]="editFlag ? true : null" type="checkbox" id="fcyRate" formControlName="headerRepeated">
            <label for="fcyRate">Is Header Present</label>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="dbCardStyle">
    <form action="" [formGroup]="addForm" novalidate class="formStyle">
      <div class="table-responsive">
        <table id="dbTable1" class="table tableStyle1 responsive nowrap vAlignMdl">
          <thead>
            <tr>
              <th>Name</th>
              <th>data type</th>
              <th>mandatory</th>
              <th>header name</th>
              <th>date format</th>
              <th>mapping column</th>
              <th>delimeter</th>
              <th>default value</th>
              <th>repeated till next value</th>
              <th>delete</th>
            </tr>
          </thead>
          <tbody formArrayName="subArray">
            <tr *ngFor="let item of addForm.get('subArray')['controls']; let i=index">
              <ng-container [formGroupName]="i">
                <td>
                  <input id="sourceCode" type="text" [readonly]="editFlag" formControlName="columnnName" class="form-control1"
                    placeholder="Name" value="">
                </td>
                <td>
                  <select class="form-select1" [attr.disabled]="editFlag ? '' : null" formControlName="dataType" placeholder="Choose DataType"
                    (change)="checkTypeStatus(i)" aria-label="Default select example"> 
                    <option class="form-class" value="" disabled selected>&nbsp; Select DataType &nbsp; </option>
                    <option class="form-class" *ngFor="let item of dataTypes" [value]="item.type">{{item.type}}</option>
                  </select>
                </td>
                <td>
                  <div class="checkboxdiv" >
                    <div class="checkStyle" >
                      <input [attr.disabled]="editFlag ? true : null"  type="checkbox"  formControlName="mandatory" id="mandatoryCheck_{{ i }}">
                      <label for="mandatoryCheck_{{ i }}"></label>
                    </div>
                  </div>
                </td>
                <td>
                  <input id="headerName_{{ i }}" type="text" [readonly]="editFlag" formControlName="headerName" class="form-control1"
                    placeholder="Header Name" value="">
                </td>
                <td>
                  <input id="dateFormat_{{ i }}" type="text" [readonly]="editFlag" class="form-control1" formControlName="dateFormat"
                    placeholder="Date Format" value="">
                </td>
                <td>
                  <input id="mappingColumn_{{ i }}" type="text" [readonly]="editFlag" class="form-control1" formControlName="mappingColumn"
                    placeholder="Mapping Column" value="">
                </td>
                <td>
                  <input id="delimeter_{{ i }}" type="text" [readonly]="editFlag" class="form-control1" formControlName="delimeter"
                    placeholder="Delimeter" value="">
                </td>
                <td>
                  <input id="defaultValue_{{ i }}" type="text" [readonly]="editFlag" class="form-control1" formControlName="defaultValue"
                    placeholder="Default Value" value="">
                </td>
                <td>
                  <input id="repeatedTillNextValue_{{ i }}" [readonly]="editFlag" type="text" class="form-control1"
                    formControlName="repeatedTillNextValue" placeholder="Repeated Till Next Value" value="">
                </td>
                <td>
                  <a class="deleteIcon2">
                    <span (click)="removeSubArray(i)"><img src="assets/images/delete-icon.svg" alt="..."></span>
                  </a>
                </td>
              </ng-container>
            </tr>
            <tr>
              <td>
                <a class="addIcon primarybg" (click)="addSubArray()">
                  <span>
                    <img src="assets/images/plus-icon.svg" alt="...">
                  </span>
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="row g-3 pb-3 justify-content-end pt-3">
        <div class="col-auto">
          <!-- [attr.disabled]="excelMappingForm.invalid " -->
          <button [disabled]="addForm.invalid"  [attr.disabled]="editFlag" (click)="finalSubmit(excelMappingForm.value,addForm.value)"
            class="btn smBtn minWdSmBtn btnPrimary">Submit</button>
        </div>
        <div class="col-auto">
          <a [routerLink]="['/excel-mapping']" routerLinkActive="router-link-active"
            class="btn smBtn minWdSmBtn btnSecondary">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
