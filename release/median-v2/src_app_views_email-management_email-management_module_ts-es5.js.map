<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Email Manangement</h2>
    </div>
    <div class="dbCardStyle">
      <div class="row g-3 pb-3 justify-content-end">
        <div class="col-auto">
          <a (click)="createEmail()" class="btn smBtn minWdSmBtn btnPrimary">New</a>
        </div>
        <div class="col-auto">
          <a href="javascript:void(0)" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
        </div>
      </div>
      <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger"
      class="dataTable table tableStyle responsive nowrap" style="width:100%">
      <!-- <table id="dbTable1" datatable class="dataTable table tableStyle responsive nowrap" style="width:100%"> -->
        <thead>
          <tr>
            <th>account type </th>
            <th>maker id</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let email of emaildata">
            <td>
              <a routerLink="/email-management/create/{{email.emailType}}" (click)="getEmail(email)" class="primaryColor">{{email.emailType}}</a>
            </td>
            <!-- <td routerLink="/email-management/create" class="primaryColor">{{email.emailType}}</td> -->
            <td>{{email.inputBy}}</td>
            <td>{{email.inputTime | date:'medium'}}</td>
          </tr>
