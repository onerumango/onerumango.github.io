<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Email Manangement</h2>
    </div>
    <div class="dbCardStyle">
      <div class="row g-3 pb-3 justify-content-end">
        <div class="col-auto" *ngIf="roleCodes.new">
          <a (click)="createEmail()" class="btn smBtn minWdSmBtn btnPrimary">{{roleCodes.new.labelDescription}}</a>
        </div>
        <div class="col-auto">
          <a href="javascript:void(0)" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
        </div>
      </div>
      <div class="table-responsive">
      <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger"
      class="dataTable table tableStyle  nowrap vAlignMdl" style="width:100%">
      <!-- <table id="dbTable1" datatable class="dataTable table tableStyle responsive nowrap" style="width:100%"> -->
        <thead>
          <tr>
            <th>account type </th>
            <th>maker id</th>
            <th>Record Status</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let email of emaildata">
            <td>
              <a routerLink="/email-management/create/{{email.emailType}}" (click)="getEmail(email)" class="primaryColor">{{email.emailType}}</a>
            </td>
            <!-- <td routerLink="/email-management/create" class="primaryColor">{{email.emailType}}</td> -->
            <td>{{email.inputBy}}</td>
            <td>{{email.recordStatus }}</td>
            <td>{{email.inputTime | date:'medium'}}</td>
            <td><span style="display: flex; gap: 50px;">
              <button class="iconBtn" color="primary" *ngIf="(email.recordStatus== 'O' || email.recordStatus== 'Open' || email.recordStatus== 'OPEN') && (email.verifiedOnce== 'Y' || email.verifiedOnce== 'YES')" 
              (click)="  close(email) ">
                <div class="btnTooltip">close</div> 
                <img src="assets/images/CROSS1.svg"   alt="...">
                </button> 
               <button class="iconBtn" color="primary" *ngIf="email.recordStatus== 'C'" (click)="reopen(email)">
                <div class="btnTooltip">Open</div> 
                <img src="assets/images/open.svg"  alt="...">
                </button>
                <button class="iconBtn" color="primary" *ngIf="email.verifiedOnce== 'N' || email.verifiedOnce== 'NO'">
                  <div class="btnTooltip">Delete</div> 
                  <img src="assets/images/delete.svg" alt="...">
                </button>
                 <button  class="iconBtn" color="primary" *ngIf="email.verifiedStatus== 'U' || email.verifiedStatus== 'UNAUTHORIZED'" (click)=" auth(email)">
                  <div class="btnTooltip">Authorize</div> 
                  <img src="assets/images/authorize.svg" alt="Authorize">
                  </button>
          </span></td>
          </tr>
        </tbody>
      </table>
    </div>
    
    </div>
  </div>
