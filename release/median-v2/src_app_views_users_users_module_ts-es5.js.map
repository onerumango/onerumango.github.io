<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">User Management</h2>
    </div>
      <div class="file" >
          <button  type="button" class="downloadButton btnFile" (click)="exportAsXLSX()">
          <span>User Report</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" style="margin-top: 2%;" fill="currentColor" class="bi bi-download" viewBox="0 0 16 16">
              <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
              <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
            </svg>
          </button>
          
      </div>
      
    <div class="dbCardStyle">
      <div class="row g-3 pb-3 justify-content-end">
        <div class="col-auto">
          
          <a (click)="createUser()" class="btn smBtn minWdSmBtn btnPrimary">New</a>
        </div>
        <div class="col-auto">
          <a [routerLink]="[ '/dashboard' ]" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
        </div>
      </div>
      <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger"
       class="dataTable table tableStyle responsive nowrap" style="width:100%">
        <thead>
          <tr>
            <th>User ID</th>
            <th>User Name</th>
            <th>Email</th>
            <th>Mobile No</th>
            <th>Auth Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let users of allUsersList">
            <td>
              <a routerLink="/users/new/{{ users.userId }}" (click)="modifyUser(users)" class="primaryColor">{{users.userId}}</a>
            </td>
            <td>{{users.userName}}</td>
            <td>{{users.email}}</td>
            <td>{{users.mobile}}</td>
            <td>{{users.verifiedStatus}}</td>
            <td>{{users.creatorDtStamp | date:'medium'}}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
