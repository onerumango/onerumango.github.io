<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Transaction Code Maintenance</h2>
  </div>
  <form [formGroup]="transactionCodeForm" class="formStyle">
    <div class="dbCardStyle">
      <div class="row gy-12">
        <div class="col-lg-4">
          <input id="usersId" type="text" oninput="this.value = this.value.toUpperCase()"
            (keyup)="keyPress($event.target.value)" formControlName="userId" class="form-control" 
            placeholder="User Id"
            value="">
            <select class="form-select"  (change)='onOptionsSelected($event)' *ngIf="showList">
              <option class="form-class" disabled selected>Select User ID</option>
            <option class="form-class"  *ngFor="let UserId of usersList"  [value]="UserId" >{{ UserId }}</option>
      </select>
        </div>
      </div> <br><br>
      <div class="row gy-4" formArrayName="transactionData">
        <div class="row" *ngFor="let data of transactionCodeForm.get('transactionData')['controls']; let i=index"
          [formGroupName]="i">
          <br><br><br>
          <div class="col-lg-4">
            <input id="transactionDes" formControlName="trnDesc" type="text" class="form-control"
              placeholder="Transaction Description" value="">
          </div>
          <div class="col-lg-4">
            <input id="transactionCode" formControlName="trnCode" class="form-control" placeholder="Transaction Code"
              value="" required>
            <!-- <div class="invalid-feedback">
              <div>Transaction Code is required</div>
            </div> -->
          </div>
          <div class="col-lg-4">
              <a href="javascript:void(0)" (click)="removeData(i)" class="addIcon deleteIcon">
                <img src="assets/images/delete-icon.png" alt="..."></a>

          </div>
        </div>
      </div>
      <div class="col-sm">
        <div class="row g-3">
          <div class="col-auto">
            <a href="javascript:void(0)" (click)="addFormGroup()" class="addIcon">
              <span><img src="assets/images/plus-icon.svg" alt="..."></span>
            </a>
          </div>
        </div>
        <div class="col-lg-12">
          <div class="row g-3 pb-3 justify-content-end pt-3">
            <div class="col-auto">
              <button  class="btn smBtn minWdSmBtn btnPrimary" [disabled]="transactionCodeForm.controls.transactionData.invalid"
                (click)="onSubmit(transactionCodeForm.value)">Submit</button>
            </div>
            <div class="col-auto">
              <a href="javascript:void(0)" [routerLink]="['/system-param-maintenance/transaction-code-summary']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
