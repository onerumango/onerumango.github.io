
<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Security Policy</h2>
    </div>
    <div class="dbCardStyle">
      <div class="row g-3 pb-3 justify-content-end">
        <!-- <div class="col-auto" *ngIf="roleCodes.new">
          <a (click)="new()" class="btn smBtn minWdSmBtn btnPrimary">{{roleCodes.new.labelDescription}}</a>
        </div> -->
        <div class="col-auto">
          <a [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
        </div>
      </div>
      <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="dataTable table tableStyle responsive nowrap" style="width:100%">
   
        <thead>
          <tr>
            <th>Version</th>
           <th> Created By</th>
           <th>
            Password Expiry InDays
           </th>
           <th>Auth Status</th>
           <th>Record Status</th>
           <th>Date</th>
          </tr>
        </thead>
        <tbody *ngFor="let data of respArray ">
          <tr *ngIf="data.version === maxVersion">
          
            <td >
              <a class="primaryColor" (click)="getResp()">{{data.version}}</a>
            
            </td>
            <td *ngIf="data.version != maxVersion">
             {{data.version}}
      
            </td>
            <td>{{data.createdBy}}</td>
            <td>{{data.pswdExpiry}}</td>
            <td>{{data.authStatus}}</td>
            <td>{{data.recordStatus}}</td>
            <td>{{data.createdDate |  date:'medium' }}</td>
           
          </tr>
        </tbody>
      </table>

      <ng-container *ngIf="isLoading">
        <div class="loading-page-center">
          <span class="indicator-progress">Please wait...
            <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
        </div>
      </ng-container>
      
    </div>
</div>
