<div class="pageContentMain" class="mt-4">

  <form action="" class="formStyle" [formGroup]="reactiveForm">
    <div class="dbCardStyle fieldwidth">
      <h2 class="pageTitle text-center mb-md-4 mb-3">Reset Password</h2>
      <div class="row gy-4">
        <div class="col-12">
          <label class="formLbl">User ID<span class="colorRed">*</span></label>
          <input id="User Id" placeholder="User Id" required class="form-control" value="" #user name="userId"
            formControlName="userId" oninput="this.value = this.value.toUpperCase()">
        </div>
        <div class="col-12">
          <label class="formLbl">OTP<span class="colorRed">*</span></label>
          <input id="Otp" placeholder="OTP" required class="form-control" value="" #otp name="otp"
            formControlName="otp">
        </div>
        <div class="col-12">
          <label class="formLbl">New Password<span class="colorRed">*</span></label>
          <input id="password" placeholder="New Password" required class="form-control" value="" #newPassword
            name="password" formControlName="password">
            <div class="invalid-feedback"
            *ngIf="reactiveForm.get('password').touched && !reactiveForm.get('password').valid">
            <div *ngIf="reactiveForm.get('password').errors.pattern">{{errorMsg}}</div>
          </div>
          <div *ngIf="reactiveForm.get('password').hasError('minlength') " class="invalid-feedback">
            Confirm Password must contain Minimum {{minPass}} digits.
          </div>
          <div *ngIf="reactiveForm.get('password').hasError('maxlength')" class="invalid-feedback">
            Confirm Password must contain Maximum {{maxPass}} digits.
          </div>
        </div>
     
        <div class="col-12">
          <label class="formLbl">confirm password<span class="colorRed">*</span></label>
          <input id="confirm password" placeholder="Confirm Password" required class="form-control" value=""
            #confirmPassword name="confirmPassword" formControlName="confirmPassword">
            <div class="invalid-feedback"
            *ngIf="reactiveForm.get('confirmPassword').touched && !reactiveForm.get('confirmPassword').valid">
            <div *ngIf="reactiveForm.get('confirmPassword').errors.pattern">{{errorMsg}}</div>
          </div>
          <div *ngIf="reactiveForm.get('confirmPassword').hasError('minlength') " class="invalid-feedback">
            Confirm Password must contain Minimum {{minPass}} digits.
          </div>
          <div *ngIf="reactiveForm.get('confirmPassword').hasError('maxlength')" class="invalid-feedback">
            Confirm Password must contain Maximum {{maxPass}} digits.
          </div>

        </div>

        <div class="col-lg-12">
          <div class="row g-3 pb-3 pt-3">
            <div class="col-auto">
              <a href="javascript:void(0)" (click)="getOtp(user.value)" class="btn smBtn minWdSmBtn btnPrimary">Get
                OTP</a>
            </div>
            <div class="col-auto">
              <button href="javascript:void(0)" [disabled]="!reactiveForm.valid"
                (click)="changePassword(newPassword.value,confirmPassword.value,user.value,otp.value)"
                class="btn smBtn minWdSmBtn btnSecondary">Submit</button>
            </div>
            <div class="col-auto">
              <a href="javascript:void(0)" type="reset" (click)="resetButton()" class="btn smBtn minWdSmBtn btnPrimary">Reset</a>
            </div>
            <div class="col-auto">
              <a href="javascript:void(0)" class="btn smBtn minWdSmBtn btnSecondary"  [routerLink]="['/login']">Exit</a>
            </div>
          </div>
        </div>
      </div>
    </div>

  </form>
</div>
