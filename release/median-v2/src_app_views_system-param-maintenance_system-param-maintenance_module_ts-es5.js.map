<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Transaction Code Maintenance</h2>
  </div>
  <form [formGroup]="transactionCodeForm" class="formStyle">
    <div class="dbCardStyle">
      <div class="col-lg-4 col-sm-6">
        <label for="roleName" class="formLbl">User ID</label>
        <ng-select id="outlineNgSelect" class="form-select"  formControlName="userId"   aria-label="Default select example">
          <!-- <option selected>Department</option> multiple="true" -->
          <ng-option hidden value="" disabled selected >--Please select--</ng-option>
          <ng-option *ngFor="let element of allUserID" [value]="element">{{element}}</ng-option>
        </ng-select>
        <!-- <div class="errorColor" *ngIf="userForm.get('department').invalid && (userForm.get('department').dirty || userForm.get('department').touched)">
          <div *ngIf="userForm.get('department').errors.required">
          Please Select Department
        </div>
      </div> -->
      </div>
      <!-- <div class="row gy-4">
        <div class="col-lg-4 col-sm-6">
          <label for="roleName" class="formLbl">User ID</label>
      <ng-select id="outlineNgSelect" id="outlineNgSelect" class="form-select"
    oninput="this.value = this.value.toUpperCase()" 
      formControlName="userId" aria-label="Default select example"  [readonly]="editFlag">
      <ng-option hidden value="" disabled selected >Please Select User Id</ng-option>
      <ng-option *ngFor="let type of userName" [value]="type">{{type}}
      </ng-option>
    </ng-select>
        </div>
      </div> -->
       <br>
 
      <div class="row gy-4" formArrayName="transactionData">
        
        <div class="row"  *ngFor="let data of transactionCodeForm.get('transactionData')['controls']; let i=index"
          [formGroupName]="i" style="margin-top: 20px;">
       

          <div class="col-lg-4 col-sm-4">
            <label for="roleName" class="formLbl" *ngIf="i==0">Transaction Code <span class="colorRed">*</span></label>
            <input id="transactionCode" formControlName="trnCode" class="form-control" placeholder="Transaction Code"
              value="" [readonly]="editFlag" required  >
            <!-- <div class="invalid-feedback">
              <div>Transaction Code is required</div>
            </div> (change)="fetchCode(transactionCodeForm.controls.transactionData.value)"-->
          </div>
          
          <div class="col-lg-4 col-sm-4">
            <label for="roleName" class="formLbl" *ngIf="i==0">Transaction Description <span class="colorRed">*</span></label>
            <input id="transactionDes" formControlName="trnDesc" type="text" class="form-control" [readonly]="editFlag"
              placeholder="Transaction Description" value="" >
          </div>

          <div class="col-auto">
            <div [ngStyle]="{'margin-top':i === 0 ? '50px' : '10px' }">
              <a (click)="removeData(i)" style="cursor: pointer;">
                <span class="ddIcon">
                  <img
                    src="assets/images/delete-icon.svg"
                    alt="..."
                  />
                </span>
              </a>
            </div>
        </div>
        </div>
      </div>
      <br>
      <br>
  
      <div class="col-sm">
        <div class="row g-3">
          <div class="col-auto">
            <a (click)="addFormGroup()" class="addIcon primarybg">
              <span><img src="assets/images/plus-icon.svg" alt="..."></span>
            </a>
          </div>
        </div>
        <div class="col-lg-12">
          <div class="row g-3 pb-3 justify-content-end pt-3">
            <div class="col-auto">
              <button type="submit"  class="btn smBtn minWdSmBtn btnPrimary" 
                    [disabled]="transactionCodeForm.controls.transactionData.invalid || submitAccBtn"
                (click)="onSubmit(transactionCodeForm.value)">Save</button>
            </div>
            <div class="col-auto">
              <a [routerLink]="['/system-param-maintenance/transaction-code-summary']" 
                  class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
