<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Transaction Code Maintenance Summary</h2>
  </div>
  <div class="dbCardStyle">
    <div class="row g-3 pb-3 justify-content-end">
      <div class="col-auto" *ngIf="roleCodes.new">
        <a [routerLink]="['/system-param-maintenance/transaction-code-new']" class="btn smBtn minWdSmBtn btnPrimary">{{roleCodes.new.labelDescription}}</a>
      </div>
      <div class="col-auto">
        <a [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
      </div>
    </div>
    <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" id="dbTable1" class="dataTable table tableStyle responsive nowrap" style="width:100%">
      <thead>
        <tr>
          <th>USER ID</th>
          <th>AUTH STATUS</th>
          <th>Record Status</th>
          <th>DATE</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let transactionData of transactionCodeData ">
          <td><a (click)="sendingDataforEdit(transactionData)" class="primaryColor" style="cursor: pointer;">{{transactionData.userId}} </a></td>
          <td>{{transactionData.verifiedStatus}}</td>
          <td>{{transactionData.recordStatus }}</td>
          <td>{{transactionData.creatorDtStamp |  date: 'medium'}}</td>  
          <!-- <td>
            <a
              class="btn"
              style="color: red"
              (click)="sendingDataforEdit(transactionData)"
             
            >
              <i class="fa fa-edit"></i>
              </a>
            <button
              class="btn"
              style="color: red"  
            >
              <i class="fa fa-trash"></i>
            </button>
          </td> -->
          <td><span style="display: flex; gap: 50px;">
           <button class="iconBtn" color="primary" 
            (click)="onClickOfClose()">
            <div class="btnTooltip"></div> 
            <img src="assets/images/CROSS1.svg"   alt="close">
            </button> 
           <button class="iconBtn" color="primary"  
            (click)="onClickOfReopen()">
            <div class="btnTooltip"></div> 
            <img src="assets/images/open.svg"  alt="Reopen">
            </button>
            <button class="iconBtn" color="primary" 
            (click)="OndeleteofUser(trnsid,currentUser)">
              <div class="btnTooltip"></div> 
              <img src="assets/images/delete.svg" alt="Delete">
            </button>
             <button  class="iconBtn" color="primary" 
              (click)="onClickOfAuth()">
              <div class="btnTooltip"></div> 
              <img src="assets/images/authorize.svg" alt="Authorize">
              </button>
          </span></td>
        </tr>
       
      </tbody>
    </table>

    <ng-container *ngIf="isLoading">
      <div class="loading-page-center">
        <span class="indicator-progress">Please wait...
          <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
      </div>
    </ng-container>

  </div>
</div>
