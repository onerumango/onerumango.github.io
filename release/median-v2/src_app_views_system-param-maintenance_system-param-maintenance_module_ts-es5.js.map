<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">User Account Restriction</h2>
  </div>

  <div class="tabStyleCol">
    <ul class="nav nav-tabs" id="myTab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home" type="button"
        (click)="resetAllTabs()" role="tab" aria-controls="home" aria-selected="true">User General Ledger</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button"
        (click)="resetAllTabs()" role="tab" aria-controls="profile" aria-selected="false">Account Class</button>
      </li>
    </ul>
  </div>
  <div class="dbCardStyle">
    <div class="tab-content" id="myTabContent">
      <div class="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
        <form *ngIf="userGLForm" [formGroup]="userGLForm" class="formStyle">
          <div class="titleStyle mb-3 mb-md-4">
            <h2 class="smTitle">General Ledger</h2>
          </div>
          <div class="row gy-4">
            <!-- <div class="col-lg-4 col-sm-6">
              <label for="permission" class="formLbl">User Id</label>
              <input class="form-control" formControlName="userId" oninput="this.value = this.value.toUpperCase()"
                list="allusers" id="exampleDataList" placeholder="Select User ID">
              <datalist id="allusers"></datalist>
            </div> -->
            <div class="col-lg-4 col-sm-6">
              <label for="roleName" class="formLbl">User ID</label>
              <ng-select id="outlineNgSelect" class="form-select"  formControlName="userId"   aria-label="Default select example">
                <!-- <option selected>Department</option> multiple="true" -->
                <ng-option hidden value="" disabled selected >--Please select--</ng-option>
                <ng-option *ngFor="let element of allUserID" [value]="element">{{element}}</ng-option>
              </ng-select>
              <!-- <div class="errorColor" *ngIf="userForm.get('department').invalid && (userForm.get('department').dirty || userForm.get('department').touched)">
                <div *ngIf="userForm.get('department').errors.required">
                Please Select Department
              </div>
            </div> -->
            </div>
            <div class="col-lg-4">
              <label for="roleName" class="formLbl">Code Permission</label>
              <div class="row g-2" >
                <div class="col-lg-6">
                  <div class="radio radioStyle">
                    <input id="radio-3"  formControlName="permission" value="Allow"  type="radio">
                    <label for="radio-3" class="radio-label">Allow</label>
                  </div>
                </div>
                <div class="col-lg-6">
                  <div class="radio radioStyle" >
                    <input id="radio-4"  formControlName="permission" type="radio" value="Disallow" >
                    <label  for="radio-4" class="radio-label">Disallow</label>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <br>
          <div formArrayName="userGLData">
            <div class="row gy-2">
              <div class="col-lg-4 col-sm-6">
                <label for="permission" class="formLbl">GL Code <span class="colorRed">*</span></label>
                
              </div>
              <div class="col-lg-4 col-sm-6">
                <label for="permission" class="formLbl">GL Code Description <span class="colorRed">*</span></label>
              </div>
              </div>
            <div class="row gy-2" *ngFor="let data of userGLForm.get('userGLData')['controls']; let i=index"
              [formGroupName]="i"><br><br><br>
              <div class="col-lg-4 col-sm-6">
                <input id="glCode" type="text" required class="form-control" formControlName="trnCode"
                  placeholder="GL Code" value="">
              </div>
              <div class="col-lg-4 col-sm-6">
                <input id="glCodeDesc" type="text" required class="form-control" formControlName="trnDesc"
                  placeholder="GL Code Description" value="">
              </div>
              <div class="col-auto">
                <div style="margin-top: 10px;">
                  <a (click)="removeuserGLData(i)"  class="deleteIcon2"><img src="assets/images/delete-icon.svg" alt="..."></a>
                </div>
                <!-- <a  (click)="removeuserGLData(i)" class="addIcon deleteIcon">
                  <img src="assets/images/delete-icon.png" alt="..."></a> -->
              </div>
            </div>
            <div class="col-lg-12">
              <div class="row g-3 pb-3 pt-3">
                <div class="col-sm">
                  <div class="row g-3">

                    <div class="col-auto">
                      <a  class="addIcon primarybg" (click)="adduserGLFormGroup()">
                        <span><img src="assets/images/plus-icon.svg" alt="..."></span>
                      </a>
                    </div>
                  </div>
                </div>
                <div class="col-sm-auto">
                  <div class="row g-3 justify-content-end">
                    <div class="col-auto">
                      <button  [disabled]="userGLForm.invalid || !submit1"
                        (click)="onSubmitGlForm(userGLForm.value)"
                        class="btn smBtn minWdSmBtn btnPrimary">Save</button>
                    </div>
                    <div class="col-auto">
                      <a 
                        [routerLink]="['/system-param-maintenance/user-gl-acc-maintenance-summary']"
                        class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="tab-pane fade" id="profile" role="tabpanel" aria-labelledby="profile-tab">
        <div class="titleStyle mb-3 mb-md-4">
          <h2 class="smTitle">Account Class</h2>
        </div>
        <form *ngIf="accountClassForm" [formGroup]="accountClassForm" class="formStyle">
          <div class="row gy-4">
            <div class="col-lg-4 col-sm-6">
              <label for="permission" class="formLbl">User Id</label>
              <input class="form-control" formControlName="userId" oninput="this.value = this.value.toUpperCase()"
                list="allusers" id="exampleDataList" placeholder="Select User ID">
              <datalist id="allusers"></datalist>
            </div>
            <div class="col-lg-4">
              <label for="roleName" class="formLbl">Code Permission</label>
              <div class="row g-2" >
                <div class="col-lg-6">
                  <div class="radio radioStyle">
                    <input id="radio-5"  formControlName="permission" value="Allow"  type="radio">
                    <label for="radio-5" class="radio-label">Allow</label>
                  </div>
                </div>
                <div class="col-lg-6">
                  <div class="radio radioStyle" >
                    <input id="radio-6"  formControlName="permission" type="radio" value="Disallow" >
                    <label  for="radio-6" class="radio-label">Disallow</label>
                  </div>
                </div>
              </div>
            </div>
          </div>

        <br>
          <div formArrayName="accountMaintenanceData">
            <div class="row gy-2">
            <div class="col-lg-4 col-sm-6">
              <label for="permission" class="formLbl">Account Class <span class="colorRed">*</span></label>
              
            </div>
            <div class="col-lg-4 col-sm-6">
              <label for="permission" class="formLbl">Account Class Description <span class="colorRed">*</span></label>
              
            </div>
            </div>
            <div class="row gy-2"
              *ngFor="let data of accountClassForm.get('accountMaintenanceData')['controls']; let i=index"
              [formGroupName]="i"><br><br><br>
              <div class="col-lg-4 col-sm-6">
                <input id="accClass" type="text" required formControlName="trnCode" class="form-control"
                  placeholder="Account Class" value="">
              </div>
              <div class="col-lg-4 col-sm-6">
                <input id="accClassDesc" type="text" required formControlName="trnDesc" class="form-control"
                  placeholder="Account Class Description" value="">
              </div>
              <div class="col-auto">
                <div style="margin-top: 10px;">
                  <a (click)="removeaccountClassData(i)"  class="deleteIcon2"><img src="assets/images/delete-icon.svg" alt="..."></a>
                </div>
                <!-- <label for="roleName" class="formLbl">Delete</label>
                <a  class="addIcon deleteIcon" (click)="removeaccountClassData(i)">
                  <img src="assets/images/delete-icon.png" alt="..."></a> -->
              </div>
            </div>
          </div>


          <div class="col-lg-12">
            <div class="row g-3 pb-3 pt-3">
              <div class="col-sm">
                <div class="row g-3">
                  <div class="col-auto">
                    <div style="margin-top: 20px;">
                    <a  class="addIcon primarybg" (click)="addaccountClassFormGroup()">
                      <span><img src="assets/images/plus-icon.svg" alt="..."></span>
                    </a>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-sm-auto">
                <div class="row g-3 justify-content-end">
                  <div class="col-auto">

                    <button [disabled]="accountClassForm.invalid  || submitAccBtn || !submit2"

                      (click)="onSubmitAccountClassForm(accountClassForm.value)"
                      class="btn smBtn minWdSmBtn btnPrimary">Save</button>
                  </div>
                  <div class="col-auto">
                    <a 
                      [routerLink]="['/system-param-maintenance/user-gl-acc-maintenance-summary']"
                      class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
