<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Transaction Code Maintenance Summary</h2>
  </div>
  <div class="dbCardStyle">
    <div class="row g-3 pb-3 justify-content-end">
      <div class="col-auto">
        <a [routerLink]="['/system-param-maintenance/transaction-code-new']" class="btn smBtn minWdSmBtn btnPrimary">New</a>
      </div>
      <div class="col-auto">
        <a [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
      </div>
    </div>
    <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" id="dbTable1" class="dataTable table tableStyle responsive nowrap" style="width:100%">
      <thead>
        <tr>
          <th>USER ID</th>
          <th>AUTH STATUS</th>
          <th>DATE</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let transactionData of transactionCodeData ">
          <td><a (click)="sendingDataforEdit(transactionData)" class="primaryColor" style="cursor: pointer;">{{transactionData.userId}} </a></td>
          <td>{{transactionData.verifiedStatus}}</td>
          <td>{{transactionData.creatorDtStamp |  date: 'medium'}}</td>
        </tr>
       
      </tbody>
    </table>

    <ng-container *ngIf="isLoading">
      <div class="loading-page-center">
        <span class="indicator-progress">Please wait...
          <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
      </div>
    </ng-container>

  </div>
</div>
