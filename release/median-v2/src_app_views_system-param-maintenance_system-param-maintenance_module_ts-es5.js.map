<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Department Id Maintenance Summary</h2>
  </div>
  <div class="dbCardStyle">
      <div class="row g-3 pb-3 justify-content-end">
          <div class="col-auto">
            <a (click)="new()" [routerLink]="['/system-param-maintenance/dept-id-maintenance-new']" class="btn smBtn minWdSmBtn btnPrimary">New</a>
          </div>
          <div class="col-auto">
            <a [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
          </div>
        </div>
    <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="dataTable table tableStyle responsive nowrap" style="width:100%">
 
      <thead>
        <tr>
          <th>Department Id</th>
          <th>Batch No From</th>
          <th>Batch No To</th>
          <th>Auth Status</th>
          <th>Date</th>
          <!-- <th>Total record</th>
          <th>Success record</th>
          <th>Failed record</th>
          <th>Status</th> -->
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let data of respArray ">
          <td><a class="primaryColor" (click)="edit(data)" style="cursor: pointer;">{{data.departId}}</a></td>
          <td>{{data.fromSeries}}</td>
          <td>{{data.toSeries}}</td>
          <td>{{data.verifiedStatus}}</td>
          <td>{{data.inputTime | date:'medium'}}</td>
        </tr>
      </tbody>
    </table>
    <ng-container *ngIf="isLoading">
      <div class="loading-page-center">
        <span class="indicator-progress">Please wait...
          <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
      </div>
    </ng-container>
    
  </div>
</div>
