<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Process Code Mapping</h2>
    </div>
    <div class="dbCardStyle">
      <div class="row g-3 pb-3 justify-content-end">
        <div class="col-auto">
          <a [routerLink]="[ '/external-system/processCodeMappingNew' ]" [routerLinkActive]="['active']" class="btn smBtn minWdSmBtn btnPrimary">New</a>
        </div>
        <div class="col-auto">
          <a [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
        </div>
      </div>
      <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" id="dbTable1" class="dataTable table tableStyle responsive nowrap" style="width:100%">
        <thead>
          <tr>
            <th>External System Name</th>
            <th>External System Code</th>
            <th>Process Code</th>
            <th>Auth Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <!-- [routerLink]="['/external-system/extSys-edit']" (click)="sendingDataforEdit(item)" -->
          <tr *ngFor="let item of processCodeMappingSummry">
            <td><span class="primaryColor" (click)="sendingDataforEdit(item)" >{{item.extSysName}}</span></td>
            <td>{{item.extSysCode}}</td>
            <td>{{item.processCode}}</td>
            <td>{{item.authStatus}}</td>
            <td>{{item.creatorDtStamp | date: 'medium'}}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
