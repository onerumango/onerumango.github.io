<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">System GL/ACC Maintenance</h2>
  </div>

  <div class="tabStyleCol">
    <ul class="nav nav-tabs" id="myTab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home" type="button"
          role="tab" aria-controls="home" aria-selected="true">GL Code Maintenance</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button"
          role="tab" aria-controls="profile" aria-selected="false">Account Maintenance</button>
      </li>
    </ul>
  </div>
  <div class="dbCardStyle">
    <div class="tab-content" id="myTabContent">
      <div class="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
        <form [formGroup]="globalGccForm" class="formStyle">
          <div class="titleStyle mb-3 mb-md-4">
            <h2 class="smTitle">GL Code Maintenance</h2>
          </div>

          <div class="row gy-12">
            <div class="col-lg-4">
              <label for="permission" class="formLbl">Code Permission</label>
              <select class="form-select" required formControlName="permission" aria-label="Default select example" >
                <!-- <option class="form-class" disabled selected>Select Permission</option> -->
                <option class="form-class" *ngFor="let permsn of permissionvalue" [disabled]="editFlag" [value]="permsn"> {{permsn}}</option>
              </select>
              <div class="errorColor"
                *ngIf="globalGccForm.controls['permission'].invalid && (globalGccForm.controls['permission'].dirty || globalGccForm.controls['permission'].touched)">
                <div *ngIf="globalGccForm.controls['permission'].errors.required">
                  Please Enter Code Permission!
                </div>
              </div>
            </div>
          </div> <br><br>
          <div class="row gy-4" formArrayName="globalGccData">
            <div class="row" *ngFor="let data of globalGccForm.get('globalGccData')['controls']; let i=index"
              [formGroupName]="i">
              <br><br><br>
              <div class="col-lg-4">
              
                <input id="transactionDes" required formControlName="trnDesc" type="text" class="form-control" [readonly]="editFlag"
                  placeholder="GL Code" value="">
                  <!-- <div class="errorColor"
                  *ngIf="globalGccForm.controls['trnDesc'].invalid && (globalGccForm.controls['trnDesc'].dirty || globalGccForm.controls['trnDesc'].touched)">
                  <div *ngIf="globalGccForm.controls['trnDesc'].errors.required">
                    Please Enter GL Code!
                  </div>
                </div> -->
              </div>
              <div class="col-lg-4">
              
                <input id="transactionCode" formControlName="trnCode" class="form-control" [readonly]="editFlag"
                  placeholder="Transaction Code Description" value="" required>
                  <!-- <div class="errorColor"
                  *ngIf="globalGccForm.controls['trnCode'].invalid && (globalGccForm.controls['trnCode'].dirty || globalGccForm.controls['trnCode'].touched)">
                  <div *ngIf="globalGccForm.controls['trnCode'].errors.required">
                    Please Enter Transaction Code Description!
                  </div>
                </div> -->
              </div>
              <div class="col-lg-4">
                <br>
                <a href="javascript:void(0);" (click)="removeGCCData(i)" class="deleteIcon2"><img src="assets/images/delete-icon.svg" alt="..."></a>
                <!-- <a href="javascript:void(0)" (click)="removeGCCData(i)" class="addIcon deleteIcon">
                  <img src="assets/images/delete-icon.png" alt="..."></a> -->

              </div>
            </div>
          </div>
          <div class="col-sm">
            <div class="row g-3">
              <div class="col-auto">
                <a href="javascript:void(0)" class="addIcon" (click)="addGCCFormGroup()">
                  <span><img src="assets/images/plus-icon.svg" alt="..."></span>
                </a>
              </div>
            </div>
            <div class="col-lg-12">
              <div class="row g-3 pb-3 justify-content-end pt-3">
                <div class="col-auto">
                  <button class="btn smBtn minWdSmBtn btnPrimary"
                    [disabled]="globalGccForm.controls.globalGccData.invalid || submitBtn"
                    (click)="onSubmitGCCForm(globalGccForm.value)">Submit</button>
                </div>
                <div class="col-auto">
                  <a href="javascript:void(0)" [routerLink]="['/system-param-maintenance/global-acc-maintenance-summary']"
                    class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="tab-pane fade" id="profile" role="tabpanel" aria-labelledby="profile-tab">
        <form [formGroup]="accountMaintenanceForm" class="formStyle">
          <div class="titleStyle mb-3 mb-md-4">
            <h2 class="smTitle">Account Class Maintenance</h2>
          </div>
          <div class="row gy-12">
            <div class="col-lg-4">
              <label for="permission" class="formLbl">Code Permission</label>
              <select class="form-select" formControlName="permission"  required aria-label="Default select example">
                <option class="form-class" selected value="Allow" [disabled]="editAccFlag">Allow</option>
                <option class="form-class" value="Disallow" [disabled]="editAccFlag">Disallow</option>
              </select>

            </div>
          </div> <br><br>
          <div class="row gy-4" formArrayName="accountMaintenanceData">
            <div class="row"
              *ngFor="let data of accountMaintenanceForm.get('accountMaintenanceData')['controls']; let i=index"
              [formGroupName]="i">
              <br><br><br>
              <div class="col-lg-4">
                
                <input id="transactionDes" required formControlName="trnDesc" type="text" class="form-control" [readonly]="editAccFlag"
                  placeholder="Account Class" value="">
              </div>
              <div class="col-lg-4">
                <input id="transactionCode" formControlName="trnCode" class="form-control" [readonly]="editAccFlag"
                  placeholder="Account Class Description" value="" required>
                <!-- <div class="invalid-feedback">
            <div>Transaction Code is required</div>
          </div> -->
              </div>
              <div class="col-lg-4">

                <br>
            <a href="javascript:void(0);"(click)="removeAccountData(i)" class="deleteIcon2"><img src="assets/images/delete-icon.svg" alt="..."></a>
                <!-- <a href="javascript:void(0)" (click)="removeAccountData(i)" class="addIcon deleteIcon">
                  <img src="assets/images/delete-icon.png" alt="..."></a> -->


              </div>
            </div>
          </div>
          <div class="col-sm">
            <div class="row g-3">
              <div class="col-auto">
                <a  class="addIcon" (click)="addAccountFormGroup()">
                  <span><img src="assets/images/plus-icon.svg" alt="..."></span>
                </a>
              </div>
            </div>
            <div class="col-lg-12">
              <div class="row g-3 pb-3 justify-content-end pt-3">
                <div class="col-auto">
                  <button class="btn smBtn minWdSmBtn btnPrimary"
                    [disabled]="accountMaintenanceForm.controls.accountMaintenanceData.invalid || submitAccBtn"
                    (click)="onSubmitAccountForm(accountMaintenanceForm.value)">Submit</button>
                </div>
                <div class="col-auto">
                  <a href="javascript:void(0)" [routerLink]="['/system-param-maintenance/global-acc-maintenance-summary']"
                    class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>

    </div>
  </div>

</div>
