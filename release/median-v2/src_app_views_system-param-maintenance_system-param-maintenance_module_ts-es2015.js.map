<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Transaction Code Maintenance</h2>
  </div>
  <form [formGroup]="transactionCodeForm" class="formStyle">
    <div class="dbCardStyle">
      <div class="row gy-12">
        <div class="col-lg-4">
          <label for="roleName" class="formLbl">User ID</label>
      <input class="form-control" formControlName="userId" oninput="this.value = this.value.toUpperCase()" 
      list="allusers" [readonly]="editFlag"
      id="exampleDataList" placeholder="Select User ID">
      <datalist  id="allusers"></datalist>
        </div>
      </div> <br><br>
      <div class="row gy-4" formArrayName="transactionData">
        <div class="row" *ngFor="let data of transactionCodeForm.get('transactionData')['controls']; let i=index"
          [formGroupName]="i">
          <br><br><br>
          <div class="col-lg-4">
            <input id="transactionCode" formControlName="trnCode" class="form-control" placeholder="Transaction Code"
              value="" [readonly]="editFlag" required>
            <!-- <div class="invalid-feedback">
              <div>Transaction Code is required</div>
            </div> -->
          </div>
          <div class="col-lg-4">

            <input id="transactionDes" formControlName="trnDesc" type="text" class="form-control" [readonly]="editFlag"
              placeholder="Transaction Description" value="">
          </div>
       
          <div class="col-lg-4"><br>
            <a href="javascript:void(0);"(click)="removeData(i)" class="deleteIcon2"><img src="assets/images/delete-icon.svg" alt="..."></a>
              <!-- <a href="javascript:void(0)" (click)="removeData(i)" class="addIcon deleteIcon">
                <img src="assets/images/delete-icon.png" alt="..."></a> -->

          </div>
        </div>
      </div><br>
      <div class="col-sm">
        <div class="row g-3">
          <div class="col-auto">
            <a href="javascript:void(0)" (click)="addFormGroup()" class="addIcon">
              <span><img src="assets/images/plus-icon.svg" alt="..."></span>
            </a>
          </div>
        </div>
        <div class="col-lg-12">
          <div class="row g-3 pb-3 justify-content-end pt-3">
            <div class="col-auto">
              <!-- disabled="transactionCodeForm.controls.transactionData.invalid" -->
              <button type="submit"  class="btn smBtn minWdSmBtn btnPrimary" [disabled]="transactionCodeForm.controls.transactionData.invalid || submitAccBtn"
                (click)="onSubmit(transactionCodeForm.value)">Submit</button>
            </div>
            <div class="col-auto">
              <a href="javascript:void(0)" [routerLink]="['/system-param-maintenance/transaction-code-summary']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
