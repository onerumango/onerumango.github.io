<div class="pageContentMain">
  <div class="pageTitleCol">
    <h2 class="pageTitle">Gl/ ACC Code Maintenance</h2>
  </div>

  <div class="tabStyleCol">
    <ul class="nav nav-tabs" id="myTab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home" type="button"
        (click)="resetAllTabs()" role="tab" aria-controls="home" aria-selected="true">User GL Maintenace</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button"
        (click)="resetAllTabs()" role="tab" aria-controls="profile" aria-selected="false">Account Class Maintenance</button>
      </li>
    </ul>
  </div>
  <div class="dbCardStyle">
    <div class="tab-content" id="myTabContent">
      <div class="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
        <form [formGroup]="userGLForm" class="formStyle">
          <div class="titleStyle mb-3 mb-md-4">
            <h2 class="smTitle">GL Code Maintenance</h2>
          </div>
          <div class="row gy-4">
            <div class="col-lg-4 col-sm-6">
              <label for="permission" class="formLbl">User Id</label>
              <input class="form-control" formControlName="userId" oninput="this.value = this.value.toUpperCase()" [readonly]="editFlag"
                list="allusers" id="exampleDataList" placeholder="Select User ID">
              <datalist id="allusers"></datalist>
            </div>
            <div class="col-lg-4 col-sm-6">
              <label for="permission" class="formLbl">Code Permission</label>
              <select class="form-select" formControlName="permission" aria-label="Default select example" >
                <option class="form-class" *ngFor="let i of permissionvalue" [value]="i" [disabled]="editFlag">{{i}}</option>
              </select>
            </div>
          </div><br>
          <div formArrayName="userGLData">
            <div class="row gy-2" *ngFor="let data of userGLForm.get('userGLData')['controls']; let i=index"
              [formGroupName]="i"><br><br><br>
              <div class="col-lg-4 col-sm-6">
                <input id="glCode" type="text" required class="form-control" formControlName="trnCode" [readonly]="editFlag"
                  placeholder="GL Code" value="">
              </div>
              <div class="col-lg-4 col-sm-6">
                <input id="glCodeDesc" type="text" required class="form-control" formControlName="trnDesc" [readonly]="editFlag"
                  placeholder="GL Code Description" value="">
              </div>
              <div class="col-auto">
                <br>
                <a href="javascript:void(0);"(click)="removeuserGLData(i)"  class="deleteIcon2"><img src="assets/images/delete-icon.svg" alt="..."></a>
                <!-- <a href="javascript:void(0)" (click)="removeuserGLData(i)" class="addIcon deleteIcon">
                  <img src="assets/images/delete-icon.png" alt="..."></a> -->
              </div>
            </div>
            <div class="col-lg-12">
              <div class="row g-3 pb-3 pt-3">
                <div class="col-sm">
                  <div class="row g-3">

                    <div class="col-auto">
                      <a href="javascript:void(0)" class="addIcon" (click)="adduserGLFormGroup()">
                        <span><img src="assets/images/plus-icon.svg" alt="..."></span>
                      </a>
                    </div>
                  </div>
                </div>
                <div class="col-sm-auto">
                  <div class="row g-3 justify-content-end">
                    <div class="col-auto">
                      <button href="javascript:void(0)" [disabled]="userGLForm.invalid || submitBtn"
                        (click)="onSubmitGlForm(userGLForm.value)"
                        class="btn smBtn minWdSmBtn btnPrimary">Submit</button>
                    </div>
                    <div class="col-auto">
                      <a href="javascript:void(0)"
                        [routerLink]="['/system-param-maintenance/user-gl-acc-maintenance-summary']"
                        class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="tab-pane fade" id="profile" role="tabpanel" aria-labelledby="profile-tab">
        <div class="titleStyle mb-3 mb-md-4">
          <h2 class="smTitle">Account Class Maintenance</h2>
        </div>
        <form [formGroup]="accountClassForm" class="formStyle">
          <div class="row gy-4">
            <div class="col-lg-4 col-sm-6">
                 <label for="userId" class="formLbl">User Id</label>
              <!-- <input id="roleName" type="text" oninput="this.value = this.value.toUpperCase()"
                (keyup)="keyPress($event.target.value)" (keyup)=keyUpevent($event) formControlName="userId" class="form-control" 
                placeholder="User Id"
                value="">
                <select class="form-select" (change)='onaccountClassChange($event)' *ngIf="showList">
                <option class="form-class"  *ngFor="let UserId of usersList"   [value]="UserId" >{{ UserId }}</option>
          </select> -->
              <input class="form-control" formControlName="userId" oninput="this.value = this.value.toUpperCase()" [readonly]="editAccFlag"
                list="allusers" id="exampleDataList" placeholder="Select User ID">
              <datalist id="allusers"></datalist>
            </div>
            <div class="col-lg-4 col-sm-6">
              <label for="permission" class="formLbl">Code Permission</label>
              <select class="form-select" formControlName="permission" aria-label="Default select example">
                <option class="form-class" *ngFor="let p of permissionvalue" [disabled]="editAccFlag" [value]="p">{{p}}</option>
              </select>
            </div>
          </div><br>
          <div formArrayName="accountMaintenanceData">
            <div class="row gy-2"
              *ngFor="let data of accountClassForm.get('accountMaintenanceData')['controls']; let i=index"
              [formGroupName]="i"><br><br><br>
              <div class="col-lg-4 col-sm-6">
                <input id="accClass" type="text" required formControlName="trnCode" class="form-control" [readonly]="editAccFlag"
                  placeholder="Account Class" value="">
              </div>
              <div class="col-lg-4 col-sm-6">
                <input id="accClassDesc" type="text" required formControlName="trnDesc" class="form-control" [readonly]="editAccFlag"
                  placeholder="Account Class Description" value="">
              </div>
              <div class="col-auto">
                <br>
                <a href="javascript:void(0);" (click)="removeaccountClassData(i)" class="deleteIcon2"><img src="assets/images/delete-icon.svg" alt="..."></a>
                <!-- <label for="roleName" class="formLbl">Delete</label>
                <a href="javascript:void(0)" class="addIcon deleteIcon" (click)="removeaccountClassData(i)">
                  <img src="assets/images/delete-icon.png" alt="..."></a> -->
              </div>
            </div>
          </div>


          <div class="col-lg-12">
            <div class="row g-3 pb-3 pt-3">
              <div class="col-sm">
                <div class="row g-3">

                  <div class="col-auto">
                    <a href="javascript:void(0)" class="addIcon" (click)="addaccountClassFormGroup()">
                      <span><img src="assets/images/plus-icon.svg" alt="..."></span>
                    </a>
                  </div>
                </div>
              </div>
              <div class="col-sm-auto">
                <div class="row g-3 justify-content-end">
                  <div class="col-auto">
                    <button [disabled]="accountClassForm.invalid || submitAccBtn"
                      (click)="onSubmitAccountClassForm(accountClassForm.value)"
                      class="btn smBtn minWdSmBtn btnPrimary">Submit</button>
                  </div>
                  <div class="col-auto">
                    <a href="javascript:void(0)"
                      [routerLink]="['/system-param-maintenance/user-gl-acc-maintenance-summary']"
                      class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
