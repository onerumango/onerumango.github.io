<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Audit Logs</h2>
    </div>
    <div class="col-2">
      <label for="roleName" class="formLbl">Export As</label>
      <select class="form-select"  aria-label="Default select example" (change)="modo($event.target.value)">
        <option></option>
        <option value="Excel">Excel</option>
        <option value="PDF">PDF</option>
      </select>
    
    </div><br>
    <div class="dbCardStyle">
      <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" data-order='[[ 5, "desc" ]]' class="dataTable table tableStyle responsive nowrap" style="width:100%">
        <thead>
          <tr>
            <th>Screen</th>
            <th>Creator</th>
            <th>Action Perform By</th>
            <th>Record</th>
            <th>Action</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let audits of auditlogdata">
            <td>{{audits.log}}</td>
            <td>{{audits.creatorId}}</td>
            <td>{{audits.actionPerformBy}}</td>
            <td>{{audits.record}}</td>
            <td>{{audits.action}}</td>
            <td>{{audits.creatorDtStamp | date:'medium'}}</td>
          </tr>
        </tbody>
      </table>
    </div>
</div>
