<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Charge Maintenance Summary</h2>
    </div>
    <div class="dbCardStyle">
        <div class="row g-3 pb-3 justify-content-end">
            <div class="col-auto">
              <a (click)="new()" *ngIf="roleCodes.new" class="btn smBtn minWdSmBtn btnPrimary">{{roleCodes.new.labelDescription}}</a>
            </div>
            <div class="col-auto">
              <a [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
            </div>
          </div>
      <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="dataTable table tableStyle responsive nowrap" style="width:100%">
   
        <thead>
          <tr>
            <th>Currency</th>
            <th>Charge Amount</th>
            <th>Charge Percentage</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of respArray ">
            <td><a class="primaryColor" (click)="edit(data)" >{{data.currency}}</a></td>
            <td>{{data.chargeAmount}}</td>
            <td>{{data.chargePercentage}}</td>
            <td>{{data.inputTime | date:'medium'}}</td>
          </tr>
        </tbody>
      </table>
      <ng-container *ngIf="isLoading">
        <div class="loading-page-center">
          <span class="indicator-progress">Please wait...
            <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
        </div>
      </ng-container>
    </div>
</div>
