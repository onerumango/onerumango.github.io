
<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Add System</h2>
    </div>
    <div class="dbCardStyle">
      <div class="row g-3 pb-3 justify-content-end">
        <div class="col-auto">
          <a (click)="new()" class="btn smBtn minWdSmBtn btnPrimary">New</a>
        </div>
        <div class="col-auto">
          <a href="javascript:void(0)" [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</a>
        </div>
      </div>
      <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="dataTable table tableStyle responsive nowrap" style="width:100%">
   
        <thead>
          <tr>
            <th>Id</th>
           <th> System Code</th>
            <th>System Code	Name</th>
            <th>Type</th>
            <th>External Ip</th>
            <th>External Port</th>
            <th>Date</th>
      
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of respArray ">
            <td>
              <a href="javascript:void(0)" class="primaryColor" (click)="getResp(data)">{{data.systemId}}</a>
            </td>
            <td>{{data.systemCode}}</td>
            <td>{{data.systemName}}</td>
            <td>{{data.serviceType}}</td>
            <td>{{data.sourceIp}}</td>
            <td>{{data.sourcePort}}</td>
            <td>{{data.createdTime |  date:'medium' }}</td>
          </tr>
        </tbody>
      </table>
    </div>
</div>
