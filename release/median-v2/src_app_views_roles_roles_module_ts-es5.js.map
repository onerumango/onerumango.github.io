<div class="pageContentMain">
    <div class="pageTitleCol">
      <h2 class="pageTitle">Role Management</h2>
    </div>

      <div class="dbCardStyle">
        <div class="row g-3 pb-3 justify-content-end">
          <div class="col-auto">
            <button (click)="createRole()" [routerLinkActive]="['active']" class="btn smBtn minWdSmBtn btnPrimary">New</button>
          </div>
          <div class="col-auto">
            <button [routerLink]="['/dashboard']" class="btn smBtn minWdSmBtn btnSecondary">Exit</button>
          </div>
        </div>
        <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger"
        class="dataTable table tableStyle responsive nowrap" style="width:100%">
          <thead>
            <tr>
              <th>Role Name</th>
              <th>Role Description</th>
              <th>Auth Status</th>
              <th>Record Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let roles of allRoles">
              <td><a (click)="getRole(roles)" class="link-color" style="cursor: pointer;">{{roles.roleName}}</a></td>
              <td>{{roles.roleDesc}}</td>
              <td>{{roles.authStatus}}</td>
              <td>{{roles.recordStatus}}</td>
              <td>{{roles.makerDtStamp | date:'medium'}}</td>
            </tr>
          </tbody>
        </table>
        <ng-container *ngIf="isLoading">
          <div class="loading-page-center">
            <span class="indicator-progress">Please wait...
              <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
          </div>
        </ng-container>
      </div>
    
   
</div>
