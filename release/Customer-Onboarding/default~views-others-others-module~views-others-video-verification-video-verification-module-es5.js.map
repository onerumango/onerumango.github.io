        <!-- </div> -->

        <br>
        
        <mat-hint>Biometric Verification*</mat-hint>

        <table formArrayName="biometricList"
            *ngFor="let item of kycVerificationForm.get('biometricList')['controls']; let i = index;">
            <tbody [formGroupName]="i">
                <tr fxLayoutGap="10px">
                  <td style="width: 300px;">
                        <mat-card class="inputMatcardDoc">
                            <mat-select formControlName="bioDocumentType" id="bioName">
                                <mat-option *ngFor="let biometric of biometrics_Type" [value]="biometric"
                                    [disabled]=isDocumentOptionDisabled2(biometric)>{{biometric}}
                                </mat-option>
                            </mat-select>
                        </mat-card>
                        <mat-error
                            *ngIf="item.controls.bioDocumentType.touched && !item.controls.bioDocumentType.valid">
                            Please Select Document Type
                        </mat-error>
                    </td>
                    <td style="width: 300px; margin: 20px; padding: 30px;">
                        <button mat-raised-button (click)="openDialogForType(item.value)"
                            style="color: cornflowerblue;">Scan</button>

                        <button mat-raised-button (click)="deleteBioMetric(item.value,i)">
                            <mat-icon class="backIcon">delete</mat-icon>
                        </button>

                    </td>
                    <td style="width: 300px;">
                        <div *ngIf="biometricData.length >0 && diaplayBioCard && item.controls.bioDocumentType.value=='Fingerprint Scan' ">
                            <mat-card fxFlex="30%" id="clr" *ngFor="let item of biometricData ; let i = index;"
                                style="margin: 0px; padding: 0px; margin-right: 10px;">
                                <p   style="margin:00px; padding: 0px; text-align: center;">{{item.fingerName}}</p>
                                <img [src]="'data:image/jpg;base64,'+item.image" />
                            </mat-card>
                        </div>

                        <div *ngIf="biometricScan && item.controls.bioDocumentType.value=='Fingerprint Scan' ">
                            <div *ngIf="imageURLBioScan == 'not_available'; else showAvatar">
                                <img class="formImg" [src]="'assets/images/no-image.jpg'" alt="">
                            </div>
                            <ng-template #showAvatar>
                                <img class="formImg" [src]="imageURLBioScan" alt="">
                            </ng-template>
                        </div>
                        <div *ngIf="irisScan  && item.controls.bioDocumentType.value=='Irish Scan'">
                            <mat-card fxFlex="30%" id="clr" style="margin: 5px; padding: 5px;">
                                <div *ngIf="imageURLIrish == 'not_available' || imageURLIrish == null ; else showAvatar">
                                    <img class="formImg" [src]="'assets/images/no-image.jpg'" alt="">
                                </div>
                                <ng-template #showAvatar>
                                    <img class="formImg" [src]="imageURLIrish" alt="">
                                </ng-template>
                            </mat-card>
                        </div>

                        <div *ngIf="faceScan  && item.controls.bioDocumentType.value=='Face Scan'">
                            <mat-card fxFlex="30%" id="clr" style="margin: 5px; padding: 5px;">
                                <div *ngIf="imageURLFace == 'not_available' || imageURLFace == null; else showAvatar">
                                    <img class="formImg" [src]="'assets/images/no-image.jpg'" alt="">
                                </div>
                                <ng-template #showAvatar>
                                    <img class="formImg" [src]="imageURLFace" alt="">
                                </ng-template>
                            </mat-card>
                        </div>

                        <div *ngIf="eScan  && item.controls.bioDocumentType.value=='E-Sign'">
                            <mat-card fxFlex="30%" id="clr" style="margin: 0px; padding: 0px;">
                                <img class="formImg" [src]="'assets/images/no-image.jpg'" alt="">
                            </mat-card>
                        </div>
                    </td>
                </tr>
            </tbody>


        </table>

        <table>
            <tr>
                <td>
                    <button mat-raised-button (click)="addBioDocs()" [disabled]="disableAddAndDelete">


                    <mat-icon color="primary">add</mat-icon>


                    </button>
                    
                </td>
            </tr>
        </table>


    </form>
</mat-card>

<div class="button">

    <button mat-button class="Back" (click)="previous()">Back</button>
    <button mat-stroked-button class="Next" (click)="onNext(kycVerificationForm.value,arrayForm.value)"
        [disabled]="disableFinish">Finish</button>
</div>
