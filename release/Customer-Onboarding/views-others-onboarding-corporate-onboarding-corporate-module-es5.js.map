<form [formGroup]="proofOfIdentityFormGroup" ngNativeValidate>


    <div class="full-width" style="background-color: #F1F1F4;">
        <div style="padding: 1rem 0">
            <div style="padding: 0 4.3rem">
                <mat-card style="border-radius: 0px;">
                    <div fxLayout="column" class="full-width" fxLayoutAlign="space-around start">
                        <div class="full-width" style="padding: 1rem 1rem;">
                            <h2 style="font-size: 18px;">Proof Of Identity</h2>
                            <mat-divider style="width:70px;border-bottom: 5px solid #456EFE;left: 30px;">
                            </mat-divider>
                        </div>
                    </div>


                    <fieldset style="border-top: 1px solid lightgray;margin-left: 20px; margin-right: 20px;">
                        <legend visible="true">Certificate of Incorporation Details</legend>
                    </fieldset>


                    <div fxLayout="row wrap" class="top">
                        <div fxFlex="100" fxLayoutGap="30px">
                            <div fxFlex="30" class="form-group">
                                <label for="forIncorpratioNumber" class="hint">Incorporation Number* </label>
                                <mat-form-field floatLabel="never">
                                    <input matInput formControlName="incorpratioNumber" id="forIncorpratioNumber"
                                    maxLength="12" minLength="12" onlyNumber >
                                    <mat-placeholder class="placeholder">Incorporation Number </mat-placeholder>
                                </mat-form-field>
                                <mat-error
                                    *ngIf="proofOfIdentityFormGroup.get('incorpratioNumber').touched && !proofOfIdentityFormGroup.get('incorpratioNumber').valid">
                                    <small>Incorporation Number is Required!</small>
                                </mat-error>
                            </div>

                            <div fxFlex="30" class="form-group">
                                <label for="forIddateOfIssue" class="hint">Date of Issue* </label>
                                <mat-form-field floatLabel="never">
                                    <input matInput id="forIddateOfIssue" [matDatepicker]="dateOfIssue" [max]="maxDate"
                                        readonly formControlName="dateOfIssue">
                                    <mat-placeholder class="placeholder">Date of Issue </mat-placeholder>
                                    <mat-datepicker-toggle matSuffix [for]="dateOfIssue"></mat-datepicker-toggle>
                                    <mat-datepicker #dateOfIssue></mat-datepicker>
                                </mat-form-field>
                                <mat-error
                                    *ngIf="proofOfIdentityFormGroup.get('dateOfIssue').touched && !proofOfIdentityFormGroup.get('dateOfIssue').valid">
                                    <small>Please Select Date of Issue</small>
                                </mat-error>
                            </div>

                            <div fxFlex="30" class="form-group">
                                <label for="forIddateOfExpiry" class="hint">Date of Expiry*</label>
                                <mat-form-field floatLabel="never">
                                    <input matInput id="forIddateOfExpiry" [matDatepicker]="dateOfExpiry"
                                       readonly formControlName="dateOfExpiry">
                                    <mat-placeholder class="placeholder">Date of Expiry </mat-placeholder>

                                    <mat-datepicker-toggle matSuffix [for]="dateOfExpiry"></mat-datepicker-toggle>
                                    <mat-datepicker #dateOfExpiry></mat-datepicker>
                                </mat-form-field>
                                <mat-error
                                    *ngIf="proofOfIdentityFormGroup.get('dateOfExpiry').touched && !proofOfIdentityFormGroup.get('dateOfExpiry').valid">
                                    <small>Please Select Date of Expiry</small>
                                </mat-error>
                            </div>

                        </div>
                    </div>

                    <div fxLayout="row wrap">
                        <div fxFlex="100" fxLayoutGap="20px">
                            <!-- <div fxFlex="2"></div> -->
                            <div fxFlex="28">
                                <mat-label> Do you want add another proof of ID? </mat-label>
                            </div>
                            <div fxFlex="50">

                                <mat-radio-group formControlName="isAnotherIdProofRequired"
                                    *ngFor="let x of ['YES','NO']; let i = index">
                                    <mat-radio-button [value]="x" (change)="radioSelection($event.value)"
                                        [checked]="x == proofOfIdentityFormGroup.value.isAnotherIdProofRequired">{{x}}
                                    </mat-radio-button>&nbsp;
                                </mat-radio-group>
                            </div>
                        </div>
                    </div>

                    <div formArrayName="idProofList" *ngIf="proofOfIdentityFormGroup.get('isAnotherIdProofRequired').value == 'YES' ">
                        <div *ngFor="let item of proofOfIdentityFormGroup.get('idProofList')['controls']; let i = index;"
                            [formGroupName]="i">
                            <fieldset  style="border-top: 1px solid lightgray;margin-left: 20px; margin-right: 20px;">
                                <div fxLayout="row wrap" class="top">
                                    <div fxFlex="100" fxLayoutGap="30px">
                                        <div fxFlex="30" class="form-group">
                                            <label for="forIdType" class="hint">Id Type </label>
                                            <mat-form-field floatLabel="never">
                                                <mat-select formControlName="idType" id="forIdType">
                                                    <mat-option disabled>select---</mat-option>
                                                    <mat-option *ngFor="let idType of idTypeList" [value]="idType">
                                                        {{idType}}
                                                    </mat-option>
                                                </mat-select>
                                             <mat-placeholder class="placeholder">Select Id Type* </mat-placeholder>
                                            </mat-form-field>
                                        </div>

                                        <div fxFlex="30" class="form-group">
                                            <label for="forIdNumber" class="hint">Id Number </label>
                                            <mat-form-field floatLabel="never">
                                                <input matInput formControlName="idNumber" id="forIdNumber"
                                                maxLength="12" minLength="6" >
                                                <mat-placeholder class="placeholder">Enter Id Number* </mat-placeholder>
                                            </mat-form-field>
                                        </div>
                                        
                                        
                                        <button mat-button (click)="deleteDocument(item,i)">
                                            <mat-icon style="color: tomato;">delete_outline</mat-icon>
                                        </button>

                                    </div>
                                    <button mat-button (click)="addDocument()" color="primary">
                                        <mat-icon>add</mat-icon> ADD
                                    </button>
                                
                                </div>

                            </fieldset>
                        </div>
                    </div>

                </mat-card>

            </div>
        </div>
    </div>
    <div class="button">
        <button mat-button class="Back" 
        (click)=" previous()">Back</button>
        <button mat-stroked-button class="Next" [disabled]="proofOfIdentityFormGroup.invalid" (click)="onSubmit(proofOfIdentityFormGroup.value)"
            >Next</button>
    </div>

</form>
