<form [formGroup]="onboardingPrimary" ngNativeValidate>
    <div class="full-width" style="background-color: #F1F1F4;">
        <div style="padding: 1rem 0">
            <div style="padding: 0 4.3rem">
                <mat-card style="border-radius: 0px;">
                    <div class="full-width" style="padding: 1rem 1rem;" >
                        <h2 style="font-size: 18px;">Primary Information</h2>
                        <mat-divider style="width:70px;border-bottom: 5px solid #456EFE;left: 30px;">
                        </mat-divider>
                    </div>
                    <mat-card-content fxLayout="row" fxLayoutAlign="start start" fxLayoutGap="10px" >
                        <!-- <div fxLayout="row" fxLayoutAlign="start start" fxLayoutGap="10px"> -->
                        <div fxFlex="20%" fxFlex.xs="100%" class="full-width">
                            <div fxLayout="column" class="full-width" fxLayoutAlign="space-around center">
                                <div>
                                    <div>
                                        <button mat-icon-button style="float: right;padding-top: 8px;
                                        padding-left: 30px;">
                                          <input type="file" input type="file"
                                          (change)="profileChange($event)"
                                    accept="image/png, image/gif, image/jpg, image/jpeg"
                                    style="opacity: 0.0;top: 0;left: 18px;bottom: 0;right: 0;position: absolute;width:100%;height: 100%;text-align: center;">
                                    <mat-icon  color="primary">edit</mat-icon>
                                          </button>
                                            </div>
                                    <ng-container *ngIf="imageURL == 'available'; else showAvatar">
                                        <img class="formImg" [src]="'assets/images/no-image.jpg'" alt="">
                                    </ng-container>
                                    <ng-template #showAvatar>
                                        <img class="formImg" [src]="imageURL" alt="">
                                    </ng-template>
                                </div>
                                <div>
                                    <mat-icon  style="margin-left: 400%;cursor: pointer;color: red;"(click)=" deleteProfileImg()">delete</mat-icon>
                                </div>
                                <!-- <div style="padding: 1rem 0;">
                                    <div
                                        style="text-decoration: underline;text-align: center;color: #2680EB;position: relative;height: 30px;line-height: 30px;cursor: pointer;padding-right: 2px;">
                                        Corporate
                                        <input type="file" input type="file" (change)="profileChange($event)"
                                            accept="image/png, image/gif, image/jpg, image/jpeg"
                                            style="opacity: 0.0;top: 0;left: 0;bottom: 0;right: 0;position: absolute;width:100%;height: 100%;text-align: center;cursor: pointer;">
                                    </div>
                                </div> -->
                            </div>
                        </div>

                        <div fxFlex="5%">

                        </div>

                        <div fxFlex="70%" fxLayoutGap="10px">
                            <div fxLayout="row" fxLayoutGap="100px">
                                <div fxFlex="40%" class="form-group">
                                    <label for="forCompanyName" class="hint">Company Name* </label>
                                  <mat-form-field floatLabel="never">
                                        <mat-select formControlName="companyName" id="forCompanyName" required>
                                            <mat-option disabled>select---</mat-option>
                                            <mat-option *ngFor="let compName of companyNameArr" [value]="compName">
                                                {{compName}}
                                            </mat-option>
                                        </mat-select>
                                        <mat-placeholder class="placeholder">Select Company Name </mat-placeholder>
                                    </mat-form-field>
                                    <mat-error
                                        *ngIf="onboardingPrimary.get('companyName').touched && !onboardingPrimary.get('companyName').valid">
                                       <small>Please select Company Name!</small> 
                                    </mat-error>
                                </div>
                                <div fxFlex="40%" class="form-group">
                                    <label for="forCategory" class="hint">Category* </label>
                                  <mat-form-field floatLabel="never">
                                        <mat-select formControlName="category" id="forCategory" required>
                                            <mat-option disabled>select---</mat-option>
                                            <mat-option *ngFor="let category of categoryArr" [value]="category">
                                                {{category}}
                                            </mat-option>
                                        </mat-select>
                                        <mat-placeholder class="placeholder">Select Category </mat-placeholder>
                                    </mat-form-field>
                                    <mat-error
                                        *ngIf="onboardingPrimary.get('category').touched && !onboardingPrimary.get('category').valid">
                                        <small>Please select Category!</small> 
                                    </mat-error>
                                </div>
                            </div>
                            <div fxLayout="row" fxLayoutGap="10px">
                                <div fxFlex="40%" class="form-group">
                                    <label for="forCountry" class="hint">Country*</label>
                                  <mat-form-field floatLabel="never">
                                        <mat-select formControlName="country" id="forCountry" required>
                                            <mat-option disabled>select---</mat-option>
                                            <mat-option *ngFor="let country of countryArr" [value]="country">
                                                {{country}}
                                            </mat-option>
                                        </mat-select>
                                        <mat-placeholder class="placeholder">Select Country </mat-placeholder>
                                    </mat-form-field>
                                    <mat-error
                                    *ngIf="onboardingPrimary.get('country').touched && !onboardingPrimary.get('country').valid">
                                    <small>Please select Country!</small> 
                                </mat-error>
                                </div>
                            </div>
                        </div>
                    </mat-card-content>

                </mat-card>

            </div>
        </div>
    </div>
    <div class="button">
        <button mat-button class="Back" (click)="previous()" >Back</button>
        <button mat-stroked-button class="Next" [disabled]="onboardingPrimary.invalid"
        (click)="onSubmit(onboardingPrimary.value)"  >Next</button>
        
    </div>
</form>
