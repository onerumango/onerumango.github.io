
        <div class="main" fxLayout="column wrap">
            <div fxFlex="100" fxLayoutAlign="end stretch">
              <mat-icon id="close" class="mat-18" (click)="closeClick()">close</mat-icon>
            </div>
            <div fxFlex="100" fxLayoutAlign="center stretch" fxLayoutGap="space-around" id="scanDiv">
              <mat-label id="scan">Your Appointment Link is active</mat-label>
            </div>
            <div fxFlex="50" fxLayoutAlign="center stretch" id="proceedDiv">
              <mat-label id="hold">Date Selected: {{dateSelected |date:"MM/dd/yy" }}</mat-label> &nbsp; &nbsp;
              <mat-label id="hold" *ngFor="let time of timeSlots[0][1]">Time Slots: {{time}}</mat-label>
            </div>
          
            <div fxFlex="50" fxLayoutAlign="center stretch">
          
                </div>
                <div fxFlex="25" fxLayoutAlign="center stretch">
                
                
                    <!-- <span id="fingerprintSpan"  fxLayoutAlign="center">{{fingerName}}</span>
                    <hr class="line"> -->
                    <img class="coImg" src="assets/images/completed.PNG">
                    <!-- <span class="fingeralgn material-icons" fxLayoutAlign="center stretch" id="fClr">fingerprint</span> -->
                 
                    
                    </div>
                    <div fxLayoutAlign="center stretch">
                        <a >Link</a>
                    </div>
                    <div>
                        <mat-card><span class="link" >
                            <a target="_blank" [href]="url" >{{url}}</a>   
                        </span></mat-card>
                      
                    </div>
            <div fxFlex="50" class="divButton" fxLayoutAlign="center stretch">
              <button mat-raised-button class="btn" (click)="done()">Done</button>
          
            </div>
            </div>
