<div fxLayout="row">
  <div fxFlex="100">
    <div class="propic text-center">
      <img
        src="assets/images/svg/undraw_opinion_dxp8.svg"
        alt=""
        class="w-80"
      />
    </div>
    <div class="profile-title text-center mt-8">
      <div class="main-title"><b>Account Services</b></div>
    </div>
  </div>
</div>
<div fxLayout="row">
  <div fxFlex="100">
    <mat-card class="p-0">
      <mat-card-title class="">
        <div class="card-title-text">Account Statement</div>
        <mat-divider></mat-divider>
      </mat-card-title>
      <mat-card-content>
        <form *ngIf="accountServiceForm" [formGroup]="accountServiceForm">
          <div fxLayout="row" fxLayoutGap="25px">
            <div fxFlex="100" fxFlex.gt-xs="50" class="pr-1">
              <div class="pb-1">
                <label><strong>Account Statement Frequency*</strong></label>
                <div class="m-16"></div>
                <mat-radio-group
                  class="mt-12"
                  name="statementFreq"
                  formControlName="statementFrequency" (change)="statementFrequency($event.value)"
                  
                  required  
                >
                  <mat-radio-button value="MONTHLY" class="ml-8" color="primary"
                    >Monthly</mat-radio-button
                  >
                  <mat-radio-button
                    value="BIANNUAL"
                    class="ml-16"
                    color="primary"
                    >Bi-Annual</mat-radio-button
                  >
                  <div class="m-16"></div>
                  <mat-radio-button
                    value="QUATERLY"
                    class="ml-8"
                    color="primary"
                    >Quaterly</mat-radio-button
                  >
                  <mat-radio-button value="ANNUAL" class="ml-16" color="primary"
                    >Annual</mat-radio-button
                  >
                </mat-radio-group>
              </div>
            </div>

            <div fxFlex="100" fxFlex.gt-xs="50">
              <div class="pb-1">
                <label><strong>Account Statement Preference*</strong></label>
                <div class="m-16"></div>
                <p
                  *ngFor="let item of statementList"
                  formArrayName="statementPref"
                >
                  <mat-checkbox
                    class="checkbox-margin"
                    color="primary"
                    (change)="onChecklistChange($event.checked, item)"
                    [value]="item"
                    [checked]="item.checked"
                    >{{ item.name }}
                  </mat-checkbox>
                </p>
              </div>
            </div>
          </div>
          <div fxLayout="row" fxLayoutAlign="start center" class="mt-32">
            <button
              mat-button
              rounded
              color="primary"
             
            >
             MORE PREFERENCE  <!--<mat-icon>keyboard_arrow_down</mat-icon>  -->
             <!--removed event from button  (click)="togglePreference()"-->
            </button>
          </div>
          <div class="m-32"></div>
          <!--removing if condition for ng-container *ngIf="show"-->
          <ng-container >
            <div fxLayout="row" fxLayoutGap="25px">
              <!-- <div fxFlex="100" fxFlex.gt-xs="50" class="pr-1">
                <div class="pb-1">
                  <label><strong>Banking Channel Preferences*</strong></label>
                  <div class="m-16"></div>
                  <mat-radio-group
                    class="mt-12"
                    name="b_preference"
                    formControlName="bankChannelPref" (change)="bankChannelPref($event.value)"
                    required
                  >
                    <mat-radio-button value="PHONE" class="ml-8" color="primary"
                      >Phone Banking</mat-radio-button
                    >
                    <mat-radio-button
                      value="KIOSK"
                      class="ml-16"
                      color="primary"
                      >Kiosk Banking</mat-radio-button
                    >
                    <div class="m-16"></div>
                    <mat-radio-button
                      value="DIRECT"
                      class="ml-8"
                      color="primary"
                      >Direct Banking</mat-radio-button
                    >
                  </mat-radio-group>
                </div>
              </div> -->
              <div fxFlex="100" fxFlex.gt-xs="50">
                <div fxLayout="row wrap">
                  <div fxFlex="100">
                    <label
                      ><strong>Banking Channel Preferences*</strong></label
                    >
                    <div class="m-12"></div>
                  </div>
                  <div fxFlex="100">
                    <div
                      fxFlex="30"
                      *ngFor="let item of bankList"
                      formArrayName="bankChannelPref"
                    
                    >
                      <mat-checkbox
                      color="primary"
                        class="checkbox-margin"
                        (change)="onCheckbankChange($event.checked, item)"
                        [value]="item"
                        [checked]="item.checked"
                        >{{ item.name }}
                      </mat-checkbox>
                    </div>
                  </div>
                </div>
              </div>

              <div fxFlex="100" fxFlex.gt-xs="50">
                <div fxLayout="row wrap">
                  <div fxFlex="100">
                    <label
                      ><strong>Communication Channel Preferences*</strong></label
                    >
                    <div class="m-12"></div>
                  </div>
                  <div fxFlex="100">
                    <div
                      fxFlex="25"
                      *ngFor="let item of communicationList"
                      formArrayName="commChannelPref"
                     
                    >
                      <mat-checkbox
                      color="primary"
                        class="checkbox-margin"
                        (change)="onCheckComChange($event.checked, item)"
                        [value]="item"
                        [checked]="item.checked"
                        >{{ item.name }}
                      </mat-checkbox>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div fxLayout="row" fxLayoutGap="25px">
              <div fxFlex="100" fxFlex.gt-xs="50" class="pr-1">
                <div class="m-32"></div>
                <div class="pb-1 mt-32">
                  Do you need a cheque book?
                  <mat-slide-toggle
                    color="primary"
                    name="checqueBook"
                    formControlName="chequebookNeeded"
                  ></mat-slide-toggle>
                </div>
              </div>

              <div fxFlex="100" fxFlex.gt-xs="50">
                <div class="pb-1 mt-32">
                  Do you need a passbook book?
                  <mat-slide-toggle
                    color="primary"
                    name="passbook"
                    formControlName="passbookNeeded"
                  ></mat-slide-toggle>
                </div>
              </div>
            </div>
          </ng-container>

          <div
            fxLayout="row"
            fxLayoutAlign="space-between center"
            fxLayoutGap="16px"
            class="mt-32"
          >
            <button mat-button rounded color="primary" (click)="goBack()">
              Back
            </button>
            <button mat-raised-button [disabled]="!accountServiceForm.valid || 
            bankChannelPreferencesArray.length == 0 ||
            commChannelPreferencesArray.length == 0  || AccStatementPreferenceArray.length == 0 "
             color="primary" (click)="onSubmit()">
              Next
            </button>
          </div>
          <!-- [disabled]=" !enableFinish || !accountServiceForm.valid ||
             commChannelPreferencesArray.length == 0 || AccStatementPreferenceArray.length == 0" -->
             <!-- [disabled]="!accountServiceForm.valid" -->
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
