<div fxLayout="row wrap">
  <div fxFlex="100">
    <div class="propic text-center">
            <img src="assets/images/svg/undraw_statistic_chart_38b6.svg" alt="" class="w-80" />
          </div>
 
    <div class="profile-title text-center mt-8">
      <div class="main-title"><b>Interest Details</b></div>
    </div>
  </div>
  <div fxFlex="100" class="m-333">
    <h5>Interest Details</h5>
    <div class="mt-24"></div>
    <form *ngIf="interestForm" [formGroup]="interestForm">
      <table
        class="cart-table default-bg mat-elevation-z0"
        [@animate]="{ value: '*', params: { delay: '100ms', x: '-50px' } }"
      >
        <!--<thead>
          <tr>
            <th class="text-muted">Interest Type</th>
            <th class="text-muted">Interest Rate Applicable</th>
            <th class="text-muted">Margin in %</th>
            <th class="text-muted">Effective Rate %</th>
          </tr>
        </thead>
      -->
        <tbody>
          <tr class="mt-4" *ngFor="let interest of in.controls; let i = index">
            <ng-container [formGroup]="interest">
              <td>
                <mat-form-field appearance="outline" class="full-width">
                  <mat-label>Interest Type</mat-label>
                  <input
                    matInput
                    formControlName="intrestType"
                    name="account_branch"
                    placeholder="Interest Type" readonly
                  />
                  <mat-icon matSuffix>credit_card</mat-icon>
                </mat-form-field>
              </td>
              <td>
                <mat-form-field appearance="outline" class="full-width">
                  <mat-label>Interest Rate Applicable</mat-label>
                  <input class="input"
                    matInput
                    formControlName="intrestRateApplicable"
                    name="account_branch"
                    placeholder="Interest Rate Applicable" readonly
                  />
                  <!-- <div>%</div> -->
                  <!-- <span class="percent">%</span> -->
                  <mat-icon matSuffix>class</mat-icon>
                </mat-form-field>
              </td>
              <td>
                <mat-form-field appearance="outline" class="full-width">
                  <mat-label>Margin in %</mat-label>
                  <input class="input"
                    matInput
                    formControlName="marginIn"
                    (keypress)=_keyPress($event)
                    name="account_branch"
                    maxlength="3"
                     type="text"
                  />
                  <!-- <span class="percent">%</span> -->
                  <mat-icon matSuffix>class</mat-icon>
                  <mat-error *ngIf="interest.controls['marginIn'].errors?.required">
                    Margin in % is <strong>required</strong>
                    </mat-error>
                    <mat-error *ngIf="interest.controls['marginIn'].errors?.max">
                      Max value allowed is 100
                      </mat-error>
                </mat-form-field>
              </td>
              <td>
                <mat-form-field appearance="outline" class="full-width">
                  <mat-label>Effective Rate %</mat-label>
                  <input class="input"
                    matInput
                    formControlName="effectiveRate"
                    (keypress)=_keyPress($event)
                    name="account_branch"
                    type="text" maxlength="3"
                    value=""
                  />
                  <!-- <span class="percent">%</span> -->
                  <mat-icon matSuffix>class</mat-icon>
                  <mat-error *ngIf="interest.controls['effectiveRate'].errors?.required">
                    Effective Rate % is <strong>required</strong>
                    </mat-error>
                  
                   <mat-error *ngIf="interest.controls['effectiveRate'].errors?.max">
                      Max value allowed is 100
                      </mat-error>
                </mat-form-field>
              </td>
            </ng-container>
          </tr>
        </tbody>
      </table>
    </form>
  </div>

  <div fxFlex="100" class="mt-16">
    <a mat-stroked-button color="primary" [routerLink]="['/home/application/enrichment/list/', accountId ]">BACK</a>
    <span fxFlex></span>
    <button mat-raised-button color="primary" type="button" [disabled]="interestForm.invalid" (click)="onSubmit(interestForm.value)">Next</button>
  </div>

</div>
