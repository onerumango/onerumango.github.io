
<mat-card class="matCard">
    <button mat-button id="close" mat-dialog-close>
        <mat-icon class="closeicon">close</mat-icon>
      </button>
    <div class="spanDiv1">
        <span class="span">Interest Details

        </span>
        <mat-divider class="divider"></mat-divider>
    </div>
<div fxLayout="row wrap" class="main">
    <div fxFlex="100">
      <!-- <div class="propic text-center">
              <img src="assets/images/svg/undraw_statistic_chart_38b6.svg" alt="" class="w-80" />
            </div> -->
   
      <!-- <div class="profile-title text-center mt-8">
        <div class="main-title"><b>Interest Details</b></div>
      </div> -->
    </div>
    <div fxFlex="100" class="m-333" class="mainDiv">
      <!-- <h5>{{this.accountType}}</h5> -->
      <div class="mt-24"></div>
      <form *ngIf="interestForm" [formGroup]="interestForm">
        <table
          class="cart-table default-bg mat-elevation-z0"
          [@animate]="{ value: '*', params: { delay: '100ms', x: '-50px' } }"
        >
          <!-- <thead>
            <tr>
              <th class="text-muted">Interest Type</th>
              <th class="text-muted">Interest Rate Applicable</th>
              <th class="text-muted">Margin in %</th>
              <th class="text-muted">Effective Rate %</th>
            </tr>
          </thead> -->
          <tbody >
            <tr [formGroup]="interest"  class="mt-4" *ngFor="let interest of in.controls; let i = index" style="display: flex;flex-wrap: wrap;">
<div class="row">
              <ng-container>
                
                <div class="heading">
                  <input
                    matInput
                    formControlName="intrestType"
                    name="account_branch" id="headingInput"   readonly
                 
                  />
                </div>
  
                  <td >
                      <mat-card class="matCardBox">
                      <mat-label  class="label">Interest Rate Applicable</mat-label>
                      <input
                        matInput
                        formControlName="intrestRateApplicable"
                        name="account_branch"
                        class="input" readonly
                      />
                   </mat-card>
                  </td>
                  <td>
                      <mat-card class="matCardBox">
                      <mat-label  class="label">Margin in %</mat-label>
                      <input
                        matInput
                        formControlName="marginIn"
                        name="account_branch"
                        class="input" readonly
                     
                      />
                  </mat-card>
                  </td>
                  <td>
                      <mat-card class="matCardBox">
                      <mat-label  class="label">Effective Rate %</mat-label>
                      <input
                        matInput
                        formControlName="effectiveRate"
                        name="account_branch"
                     
                        value="" class="input" readonly
                      /> 
                   
                    </mat-card>
                  </td>
              </ng-container>
           </div>
            </tr>
          </tbody>
        </table>
      </form>
    </div>
  
    <!-- <div fxFlex="100" class="mt-16">
      <span mat-stroked-button color="primary" (click)="goBack()">edit</span>
      <span fxFlex></span>
      <!-- <button mat-raised-button color="primary" type="button" [disabled]="interestForm.invalid" (click)="onSubmit(interestForm.value)">DONE</button> -->
    <!-- </div> --> 
  
  </div>
  

  <span class="spanDiv" (click)="edit()">Edit</span>
</mat-card>
