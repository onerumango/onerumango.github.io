        <div>
            <h3> Either Secured or Unsecured Overdraft Details are Mandatory.</h3>
        </div>

                    <button tabindex="-1" (click)="Yes()" mat-raised-button class="full-width mat-elevation-z0 yesBtn">OK</button>
                </div>
            </div>
        </div>
    </div>
</div>
