<div class="head">
	<h1 class="main-head">New Customer Onboarding | Corporate</h1>
	<div class="basic-container">
		<mat-tab-group mat-align-tabs="start" [(selectedIndex)]="tabIndex" #tabGroup>

		<mat-tab [disabled]='!tab1 || finishFlag' label="Basic Information">
				<app-onborading-primary></app-onborading-primary>
			</mat-tab>
		<mat-tab [disabled]='!tab2 || finishFlag' label="Director Details">
				<app-director-details></app-director-details>
			</mat-tab>
		<mat-tab [disabled]='!tab3 || finishFlag' label="Contact Information">
				<app-contact-information></app-contact-information>
			</mat-tab>
		<mat-tab [disabled]='!tab4 || finishFlag' label="Proof Of Identity">
				<app-proof-of-identity></app-proof-of-identity>
			</mat-tab>
		<mat-tab [disabled]='!tab5 || finishFlag' label="Other Information">
				<app-other-info-corporate></app-other-info-corporate>
			</mat-tab>
		</mat-tab-group>
	</div>
</div>
